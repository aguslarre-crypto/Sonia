// ── NOTIFICATION ENGINE ───────────────────────────────────────────────────────
// Requests permission once, then schedules "did session happen + was it paid?"
// checks 1 hour after each confirmed appointment time.
function useNotifications(data, setData){
  const permRef = useRef(false);

  const requestPerm = useCallback(async()=>{
    if(!('Notification' in window))return false;
    if(Notification.permission==="granted"){permRef.current=true;return true;}
    if(Notification.permission==="denied")return false;
    const r = await Notification.requestPermission();
    permRef.current = r==="granted";
    return permRef.current;
  },[]);

  // Show an in-app confirmation prompt (notifications can't show buttons on Android)
  const [prompt, setPrompt] = useState(null); // {apptId, patientName, time, date}

  // Check every minute if any appointment ended ~1 hour ago and still "confirmed"
  useEffect(()=>{
    const check=()=>{
      const now = new Date();
      const todayStr = now.toISOString().split("T")[0];
      const nowMins = now.getHours()*60 + now.getMinutes();

      const candidates = data.appointments.filter(a=>{
        if(a.date!==todayStr) return false;
        if(a.status!=="confirmed") return false;
        if(a._prompted) return false; // already asked
        const [hh,mm] = a.time.split(":").map(Number);
        const endMins = hh*60 + mm + 50; // 50-min session
        const diff = nowMins - endMins;
        return diff >= 5 && diff <= 90; // between 5 and 90 minutes after end
      });

      if(candidates.length>0 && !prompt){
        const a = candidates[0];
        setPrompt(a);
        // Also fire a native notification if permitted
        if(Notification.permission==="granted"){
          try{
            new Notification("Sonia — Confirmar sesión", {
              body: `¿Se realizó la sesión de ${a.patientName}? Abre Sonia para confirmar.`,
              icon: "./icon-192.png",
              tag: `session-${a.id}`,
            });
          }catch{}
        }
      }
    };
    const t = setInterval(check, 60_000);
    check(); // run immediately on mount
    return ()=>clearInterval(t);
  },[data.appointments, prompt]);

  const resolvePrompt = useCallback((apptId, sessionDone, paymentDone, fee)=>{
    setData(d=>{
      let appts = d.appointments.map(a=>{
        if(a.id!==apptId) return a;
        return {...a, status: sessionDone?"done":"cancelled", _prompted:true};
      });
      let pays = d.payments;
      if(sessionDone && paymentDone){
        const appt = d.appointments.find(a=>a.id===apptId);
        if(appt){
          pays = [...pays, {id:Date.now(), patientId:appt.patientId, patientName:appt.patientName,
            date:TODAY, amount:fee||DEFAULT_FEE, method:"efectivo", concept:`Sesión ${appt.time}`, status:"paid"}];
        }
      }
      return {...d, appointments:appts, payments:pays};
    });
    setPrompt(null);
  },[setData]);

  const dismissPrompt = useCallback((apptId)=>{
    // Mark as prompted so we don't ask again, but don't change status
    setData(d=>({...d, appointments:d.appointments.map(a=>a.id===apptId?{...a,_prompted:true}:a)}));
    setPrompt(null);
  },[setData]);

  return {requestPerm, prompt, resolvePrompt, dismissPrompt};
}

// ── SESSION CONFIRM PROMPT ────────────────────────────────────────────────────
function SessionPrompt({appt, patients, onResolve, onDismiss}){
  const patient = patients.find(p=>p.id===appt.patientId);

          <div style={{fontSize:13,color:C.muted}}>{appt.patientName} · {appt.time}</div>
        </div>

        <div style={{display:"flex",gap:10,marginBottom:20}}>
          <button onClick={()=>{
              // session happened — ask about payment
              const payRow = (
                <div style={{marginBottom:20}}>
                  <div style={{fontSize:13,color:C.text,marginBottom:12,textAlign:"center"}}>¿Se cobró la sesión?</div>
                  <div style={{display:"flex",gap:8,alignItems:"center",justifyContent:"center",marginBottom:4}}>
                    <button onClick={()=>onResolve(appt.id,true,true,fee)}
                      style={{flex:1,background:C.green+"22",border:`1px solid ${C.green}44`,borderRadius:10,padding:"12px 0",color:C.green,fontSize:13,fontWeight:600}}>
                      ✓ Sí, cobré ${fee.toLocaleString()}
                    </button>
                    <button onClick={()=>onResolve(appt.id,true,false,fee)}
                      style={{flex:1,background:C.yellow+"22",border:`1px solid ${C.yellow}44`,borderRadius:10,padding:"12px 0",color:C.yellow,fontSize:13,fontWeight:600}}>
                      Pendiente
                    </button>
                  </div>
                </div>
              );
              // Replace content — we'll use a trick: just call resolve with sessionDone=true
              // and ask payment in the same action via a second step rendered inline
              // For simplicity: open a quick inline toggle
              document.getElementById('sp-step2').style.display='block';
              document.getElementById('sp-step1').style.display='none';
            }}
            style={{flex:1,background:C.green+"22",border:`1px solid ${C.green}44`,borderRadius:12,padding:"16px 0",color:C.green,fontSize:14,fontWeight:600}}>
            ✓ Sí se realizó
          </button>
          <button onClick={()=>onResolve(appt.id,false,false,fee)}
            style={{flex:1,background:C.red+"22",border:`1px solid ${C.red}44`,borderRadius:12,padding:"16px 0",color:C.red,fontSize:14,fontWeight:600}}>
            ✗ No se realizó
          </button>
        </div>

        <div id="sp-step1" style={{textAlign:"center"}}>
          <button onClick={()=>onDismiss(appt.id)} style={{background:"none",color:C.muted,fontSize:12,padding:"8px 0"}}>
            Preguntar después
          </button>
        </div>

        <div id="sp-step2" style={{display:"none"}}>
          <div style={{fontSize:13,color:C.text,marginBottom:12,textAlign:"center",fontWeight:600}}>¿Se cobró la sesión?</div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <button onClick={()=>onResolve(appt.id,true,true,fee)}
              style={{flex:1,background:C.green+"22",border:`1px solid ${C.green}44`,borderRadius:10,padding:"13px 0",color:C.green,fontSize:13,fontWeight:600}}>
              💵 Sí, ${fee.toLocaleString()}
            </button>
            <button onClick={()=>onResolve(appt.id,true,false,fee)}
              style={{flex:1,background:C.yellow+"22",border:`1px solid ${C.yellow}44`,borderRadius:10,padding:"13px 0",color:C.yellow,fontSize:13,fontWeight:600}}>
              ⏳ Queda pendiente
            </button>
          </div>
          <button onClick={()=>onDismiss(appt.id)} style={{background:"none",color:C.muted,fontSize:12,padding:"4px 0",display:"block",margin:"0 auto"}}>
            Preguntar después
          </button>
        </div>
      </div>
    </div>
  );
}

// ── VOICE ENGINE ─────────────────────────────────────────────────────────────
function useVoice(onResult){
  const [listening,setListening]=useState(false);
  const [status,setStatus]=useState("");
  const recRef=useRef(null);
  const permOk=useRef(false);

  const flash=useCallback(msg=>{setStatus(msg);setTimeout(()=>setStatus(""),4500);},[]);
  const speak=useCallback(txt=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang="es-ES";u.rate=1.05;
    setTimeout(()=>window.speechSynthesis.speak(u),80);
  },[]);

  const doRecognize=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){flash("⚠ Reconocimiento de voz no disponible en este navegador");return;}
    if(recRef.current){try{recRef.current.abort();}catch{}}
    const r=new SR();
    r.lang="es-ES";r.continuous=false;r.interimResults=false;r.maxAlternatives=5;
    r.onstart=()=>setListening(true);
    r.onresult=e=>{
      setListening(false);
      const txt=e.results[0][0].transcript;
      flash(`🎤 "${txt}"`);
      onResult(txt,speak,flash);
    };
    r.onerror=e=>{
      setListening(false);
      const msgs={"not-allowed":"❌ Permiso de micrófono denegado — ve a Configuración del sitio en Chrome","no-speech":"Sin audio, intenta de nuevo","network":"Sin conexión para reconocimiento","aborted":""};
      if(msgs[e.error]!==undefined)flash(msgs[e.error]);
      else flash(`❌ Error de micrófono: ${e.error}`);
    };
    r.onend=()=>setListening(false);
    recRef.current=r;
    try{r.start();}catch(err){flash("❌ No se pudo iniciar: "+err.message);}
  },[onResult,flash]);

  const start=useCallback(()=>{
    if(listening){try{recRef.current?.abort();}catch{}setListening(false);return;}
    if(!permOk.current&&navigator.mediaDevices?.getUserMedia){
      flash("🎙 Solicitando permiso de micrófono...");
      navigator.mediaDevices.getUserMedia({audio:true,video:false})
        .then(stream=>{
          stream.getTracks().forEach(t=>t.stop());
          permOk.current=true;
          doRecognize();
        })
        .catch(err=>{
          flash(err.name==="NotAllowedError"
            ?"❌ Micrófono bloqueado — toca el candado 🔒 en la barra de Chrome → Permisos del sitio → Micrófono → Permitir"
            :"❌ "+err.message);
        });
    } else {
      doRecognize();
    }
  },[listening,doRecognize,flash]);

  return {listening,status,start,speak,flash};
}

// ── VOICE COMMAND PROCESSOR ──────────────────────────────────────────────────
function processVoiceCommand(text,dataRef,setData,setTab,speak,flash,setSlotDays){
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
  const t=norm(text);
  const {patients,appointments,payments}=dataRef.current;
  const matchName=hint=>patients.find(p=>norm(p.name).split(" ").some(w=>hint.includes(w)&&w.length>2));

  // NAV
  if(/(ir a|abrir|ver|mostrar)\s+(pacientes|inicio)/.test(t)){setTab("pacientes");speak("Pacientes");return;}
  if(/(ir a|abrir|ver|mostrar)\s+agenda/.test(t)){setTab("agenda");speak("Agenda");return;}
  if(/(ir a|abrir|ver|mostrar)\s+pagos/.test(t)){setTab("pagos");speak("Pagos");return;}
  if(/(ir a|abrir|ver|mostrar)\s+(chat|asistente|sonia)/.test(t)){setTab("chat");speak("Asistente");return;}
  if(/(ir a|abrir|ver|mostrar)\s+perfil/.test(t)){setTab("perfil");speak("Perfil");return;}

  // FREE SLOTS
  const slotM=t.match(/(?:buscar|mostrar|ver|busca|muestra)\s+(?:horas?\s+libres?|disponibilidad)(?:.*?(\d+)\s*dias?)?/);
  if(slotM){
    const n=slotM[1]?parseInt(slotM[1]):7;
    setTab("agenda");setSlotDays(n);
    speak(`Horas libres, ${n} días`);flash(`🔍 Disponibilidad: ${n} días`);return;
  }
  if(/horas?\s+libres?|disponibilidad|horario\s+libre/.test(t)){
    const n=t.includes("mañana")?2:t.includes("semana")?7:5;
    setTab("agenda");setSlotDays(n);speak("Mostrando disponibilidad");flash("🔍 Horas libres");return;
  }

  // REGISTER PAYMENT
  const payM=t.match(/(?:cobr|pago|registr)\S*\s+(?:de\s+|a\s+)?([a-z\s]+?)\s+([\d]+)/i);
  if(payM){
    const p=matchName(payM[1].trim());
    const amt=parseInt(payM[2]);
    if(p&&amt>0){
      setData(d=>({...d,payments:[...d.payments,{id:Date.now(),patientId:p.id,patientName:p.name,date:TODAY,amount:amt,method:"efectivo",concept:"Pago por voz",status:"paid"}]}));
      speak(`${amt} pesos de ${p.name.split(" ")[0]} registrados`);flash(`✓ $${amt.toLocaleString()} — ${p.name}`);setTab("pagos");
    }else if(!p){speak("No encontré ese paciente");flash("❌ Paciente no encontrado");}
    else{speak("Monto inválido");flash("❌ Monto inválido");}
    return;
  }

  // NEW APPOINTMENT
  const apM=t.match(/(?:agendar|crear|nueva|programar)\s+(?:una\s+)?(?:cita|sesion)\s+(?:para|con)\s+([a-z\s]+?)(?:\s+a\s+las?\s+(\d{1,2})(?::(\d{2}))?)?$/i);
  if(apM){
    const p=matchName((apM[1]||"").trim());
    if(p){
      const h=apM[2]?String(parseInt(apM[2])).padStart(2,"0"):"10";
      const time=`${h}:${apM[3]||"00"}`;
      setData(d=>({...d,appointments:[...d.appointments,{id:Date.now(),patientId:p.id,patientName:p.name,date:TODAY,time,duration:50,status:"confirmed",fee:DEFAULT_FEE}]}));
      speak(`Cita para ${p.name.split(" ")[0]} a las ${h}`);flash(`✓ Cita ${p.name.split(" ")[0]} ${time}`);setTab("agenda");
    }else{speak("No encontré ese paciente");flash("❌ Paciente no encontrado");}
    return;
  }

  // MARK DONE
  const doneM=t.match(/(?:marcar|completar|terminar)\s+(?:sesion|cita)?\s*(?:de|con)?\s*([a-z\s]+?)(?:\s+como\s+)?(?:realizada|hecha|completada)?$/i);
  if(doneM&&(t.includes("realiz")||t.includes("hecha")||t.includes("complet")||t.includes("marcar")||t.includes("terminar"))){
    const hint=norm(doneM[1]);
    const appt=[...appointments].reverse().find(a=>a.status==="confirmed"&&norm(a.patientName).split(" ").some(w=>hint.includes(w)&&w.length>2));
    if(appt){
      setData(d=>({...d,appointments:d.appointments.map(a=>a.id===appt.id?{...a,status:"done"}:a)}));
      speak(`Sesión de ${appt.patientName.split(" ")[0]} completada`);flash(`✓ Realizada — ${appt.patientName}`);
    }else{speak("No encontré esa cita");flash("❌ Cita no encontrada");}
    return;
  }

  // QUERIES
  if(/(pendiente|cobrar|saldo)/.test(t)){
    const total=payments.filter(p=>p.status==="pending").reduce((s,p)=>s+p.amount,0);
    speak(total>0?`${total.toLocaleString()} pesos pendientes`:"Sin cobros pendientes");flash(`Pendiente: $${total.toLocaleString()}`);return;
  }
  if(/(citas|sesiones).*(hoy)|hoy.*(citas|sesiones)/.test(t)){
    const n=appointments.filter(a=>a.date===TODAY).length;
    speak(`${n} cita${n!==1?"s":""} hoy`);flash(`Citas hoy: ${n}`);return;
  }
  if(/(cuantos|total).*(pacientes)/.test(t)){
    speak(`${patients.length} pacientes`);flash(`Pacientes: ${patients.length}`);return;
  }

  speak("No entendí, intenta de nuevo");flash("¿? No reconocido");
}

// ── FREQUENCY HELPERS ────────────────────────────────────────────────────────
const FREQ_LABELS = {none:"Sin frecuencia fija",weekly:"Semanal",biweekly:"Quincenal"};
const DAY_NAMES = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const DAY_SHORT = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

// Given a patient's frequency settings and their existing appointments, compute
// the next suggested date after the last confirmed/done appointment.
function computeNextSuggested(patient, appointments){
  const {frequency, preferredDay, preferredTime} = patient;
  if(!frequency || frequency==="none" || preferredDay===undefined || !preferredTime) return null;
  const intervalDays = frequency==="weekly" ? 7 : 14;

  // Find the most recent confirmed/done appointment for this patient
  const pAppts = appointments
    .filter(a=>a.patientId===patient.id && (a.status==="confirmed"||a.status==="done"))
    .sort((a,b)=>b.date.localeCompare(a.date));

  let baseDate;
  if(pAppts.length>0){
    // Start from last appointment + interval
    baseDate = new Date(pAppts[0].date+"T12:00:00");
    baseDate.setDate(baseDate.getDate()+intervalDays);
  } else {
    // No appointments yet — start from today
    baseDate = new Date(TODAY+"T12:00:00");
  }

  // Advance to the preferred day of week
  const targetDow = parseInt(preferredDay);
  let candidate = new Date(baseDate);
  // Find next occurrence of preferredDay on or after baseDate
  let tries = 0;
  while(candidate.getDay() !== targetDow && tries < 14){
    candidate.setDate(candidate.getDate()+1);
    tries++;
  }
  // If that date is in the past, add one interval
  const candidateStr = candidate.toISOString().split("T")[0];
  if(candidateStr < TODAY){
    candidate.setDate(candidate.getDate()+intervalDays);
    // Re-align to preferred day
    tries=0;
    while(candidate.getDay()!==targetDow && tries<14){
      candidate.setDate(candidate.getDate()+1);tries++;
    }
  }

  return {date: candidate.toISOString().split("T")[0], time: preferredTime};
}

          <div style={{background:C.bg,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
            <div>
              <div style={{fontSize:11,color:C.muted,marginBottom:2}}>PRÓXIMA SUGERIDA</div>
              <div style={{fontSize:13,fontWeight:600,color:C.text}}>{suggestion.date} · {suggestion.time}</div>
              <div style={{fontSize:11,color:C.muted}}>{DAY_SHORT[new Date(suggestion.date+"T12:00:00").getDay()]}</div>
            </div>
            <button onClick={scheduleNext}
              style={{background:C.accent,color:"#fff",borderRadius:9,padding:"8px 14px",fontSize:12,fontWeight:600,flexShrink:0,border:"none"}}>

            </button>
          </div>
        )}

        {/* Toast confirmation */}
        {schedulePreview&&(
          <div style={{marginTop:8,background:C.green+"18",border:`1px solid ${C.green}44`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.green}}>
            ✓ Cita agendada: {schedulePreview.date} {schedulePreview.time}
          </div>
        )}

        {/* Upcoming sessions preview */}
        {previewSessions.length>0&&(
          <div style={{marginTop:12}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Próximas sesiones proyectadas</div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {previewSessions.map((s,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:s.exists?C.green+"0f":C.bg,borderRadius:8,border:`1px solid ${s.exists?C.green+"33":C.border}`}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:10,color:C.muted,minWidth:24}}>{DAY_SHORT[new Date(s.date+"T12:00:00").getDay()]}</span>
                    <span style={{fontSize:13,color:C.text}}>{s.date}</span>
                    <span style={{fontSize:12,color:C.muted}}>{s.time}</span>
                  </div>
                  {s.exists
                    ?<span style={{fontSize:10,color:C.green}}>✓ Agendada</span>
                    :<button onClick={()=>{
                        const clash=appointments.find(a=>a.patientId===patient.id&&a.date===s.date&&a.time===s.time&&a.status!=="cancelled");
                        if(clash)return;
                        setData(d=>({...d,appointments:[...d.appointments,{id:Date.now(),patientId:patient.id,patientName:patient.name,date:s.date,time:s.time,duration:50,status:"confirmed",fee:DEFAULT_FEE}]}));
                      }}
                      style={{background:"transparent",border:`1px solid ${C.accent}66`,borderRadius:6,color:C.accent,fontSize:11,padding:"3px 10px"}}>
                      + Agendar
                    </button>
                  }
                </div>
              ))}
            </div>
          </div>
        )}
      </Card>

      {/* ── PAYMENT SCHEME CARD ──────────────────────────────────────── */}
      {(()=>{
        const scheme = patient.paymentScheme || "per_session";
        const schemeColor = {per_session:C.muted, weekly:C.accent, monthly_advance:C.green, monthly_arrears:C.yellow}[scheme];
        return (
          <Card style={{marginBottom:14, borderColor:scheme!=="per_session"?schemeColor+"55":C.border}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>💳 Esquema de cobro</div>
                <div style={{fontSize:13,color:C.text}}>
                  <span style={{color:schemeColor,fontWeight:600}}>{PAY_SCHEME_LABELS[scheme]}</span>
                </div>
                {scheme==="monthly_advance"&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Pago al inicio del mes</div>}
                {scheme==="monthly_arrears"&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Pago al final del mes</div>}
                {scheme==="weekly"&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Pago cada semana</div>}
              </div>
              <button onClick={()=>{
                  const opts=["per_session","weekly","monthly_advance","monthly_arrears"];
                  const idx=opts.indexOf(patient.paymentScheme||"per_session");
                  const next=opts[(idx+1)%opts.length];
                  setData(d=>({...d,patients:d.patients.map(p=>p.id===patient.id?{...p,paymentScheme:next}:p)}));
                }}
                style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,padding:"6px 12px",fontSize:12,flexShrink:0}}>
                Cambiar
              </button>
            </div>
            {/* Monthly payment tracker */}
            {(scheme==="monthly_advance"||scheme==="monthly_arrears")&&(()=>{
              const thisMonth=TODAY.slice(0,7);
              const monthPays=pP.filter(p=>p.date.startsWith(thisMonth)&&p.status==="paid");
              const monthSess=pA.filter(a=>a.date.startsWith(thisMonth)&&a.status==="done").length;
              const monthTotal=monthPays.reduce((s,p)=>s+p.amount,0);
              const expected=monthSess*DEFAULT_FEE;
              const balance=monthTotal-expected;
              return (
                <div style={{marginTop:12,background:C.bg,borderRadius:10,padding:"10px 14px"}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:6}}>RESUMEN DEL MES</div>
                  <div style={{display:"flex",gap:16}}>
                    <div><div style={{fontSize:11,color:C.muted}}>Sesiones</div><div style={{fontSize:16,fontWeight:600,color:C.text}}>{monthSess}</div></div>
                    <div><div style={{fontSize:11,color:C.muted}}>Cobrado</div><div style={{fontSize:16,fontWeight:600,color:C.green}}>${monthTotal.toLocaleString()}</div></div>
                    <div><div style={{fontSize:11,color:C.muted}}>Balance</div><div style={{fontSize:16,fontWeight:600,color:balance>=0?C.green:C.red}}>{balance>=0?"+":""}{balance.toLocaleString()}</div></div>

            })()}
          </Card>

      })()}

      {/* Tabs */}
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
        {tabs.map(t=><button key={t.id} className="pill" onClick={()=>setT(t.id)} style={{background:tab===t.id?C.accent:"transparent",color:tab===t.id?"#fff":C.muted,borderColor:tab===t.id?C.accent:C.border}}>{t.l}</button>)}

      {tab==="resumen"&&(

          <div style={{display:"flex",gap:10}}><Stat label="Pendiente" value={`$${pend.toLocaleString()}`} color={pend>0?C.yellow:C.muted}/><Stat label="Notas" value={pN.length} sub="clínicas"/></div>
          {pN[0]&&<Card><div style={{fontSize:11,color:C.muted,marginBottom:6,display:"flex",justifyContent:"space-between"}}><span>ÚLTIMA NOTA</span><span>{pN[0].date}</span></div><p style={{fontSize:13,lineHeight:1.6,display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{pN[0].content}</p><button onClick={()=>setT("notas")} style={{background:"none",color:C.accent,fontSize:12,marginTop:8,padding:0}}>Ver todas →</button></Card>}

      {tab==="sesiones"&&(

              <div style={{minWidth:48,textAlign:"center"}}><div style={{fontSize:13,fontWeight:600,color:C.al}}>{a.time}</div><div style={{fontSize:10,color:C.muted}}>50 min</div></div>

      {tab==="pagos"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",gap:10,marginBottom:4}}><Stat label="Cobrado" value={`$${paid.toLocaleString()}`} color={C.green}/><Stat label="Pendiente" value={`$${pend.toLocaleString()}`} color={pend>0?C.yellow:C.muted}/></div>

        <div>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}><Btn small onClick={()=>setNM(true)}>+ Nueva nota</Btn></div>

            {pN.length===0?<Card style={{textAlign:"center",padding:36,color:C.muted}}>Sin notas</Card>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{display:"flex",gap:8}}><Badge color={C.accent}>#{n.session}</Badge><span style={{fontSize:11,color:C.muted,alignSelf:"center"}}>{n.date}</span></div><Badge color={C.muted}>🔒</Badge></div>
                <p style={{fontSize:13,lineHeight:1.7}}>{n.content}</p>
              </Card>
            ))}
          </div>
        </div>
      )}

      {/* ── FREQUENCY MODAL ─────────────────────────────────────────── */}
      {freqModal&&(
        <Sheet onClose={()=>setFM(false)} title={`Frecuencia — ${patient.name}`}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>

            {/* Frequency selector */}
            <div>
              <div style={{fontSize:11,color:C.muted,fontWeight:500,letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>Frecuencia</div>
              <div style={{display:"flex",gap:8}}>
                {["none","weekly","biweekly"].map(f=>(
                  <button key={f} onClick={()=>setFF(d=>({...d,frequency:f}))}
                    style={{flex:1,padding:"10px 6px",borderRadius:10,border:`2px solid ${ff.frequency===f?(f==="weekly"?C.accent:f==="biweekly"?C.green:C.muted):C.border}`,background:ff.frequency===f?(f==="weekly"?C.accent+"22":f==="biweekly"?C.green+"22":C.surface):C.surface,color:ff.frequency===f?(f==="weekly"?C.accent:f==="biweekly"?C.green:C.muted):C.muted,fontSize:12,fontWeight:600,transition:"all .15s",textAlign:"center"}}>
                    {f==="none"?"Sin frecuencia":f==="weekly"?"Semanal":"Quincenal"}
                    {f==="weekly"&&<div style={{fontSize:10,fontWeight:400,marginTop:2}}>cada 7 días</div>}
                    {f==="biweekly"&&<div style={{fontSize:10,fontWeight:400,marginTop:2}}>cada 14 días</div>}
                  </button>
                ))}
              </div>
            </div>

            {ff.frequency!=="none"&&(
              <>
                {/* Day selector */}
                <div>
                  <div style={{fontSize:11,color:C.muted,fontWeight:500,letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>Día preferido</div>
                  <div style={{display:"flex",gap:5}}>
                    {[1,2,3,4,5,6,0].map(d=>(
                      <button key={d} onClick={()=>setFF(f=>({...f,preferredDay:String(d)}))}
                        style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${ff.preferredDay===String(d)?C.accent:C.border}`,background:ff.preferredDay===String(d)?C.accent:C.surface,color:ff.preferredDay===String(d)?"#fff":C.muted,fontSize:11,fontWeight:500}}>
                        {DAY_SHORT[d]}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Time selector */}
                <div>
                  <div style={{fontSize:11,color:C.muted,fontWeight:500,letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>Hora preferida</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {WORK_HOURS.map(h=>(
                      <button key={h} onClick={()=>setFF(f=>({...f,preferredTime:h}))}
                        style={{padding:"7px 12px",borderRadius:8,border:`1px solid ${ff.preferredTime===h?C.accent:C.border}`,background:ff.preferredTime===h?C.accent:C.surface,color:ff.preferredTime===h?"#fff":C.muted,fontSize:12,fontWeight:500}}>
                        {h}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Preview of next suggested */}
                {(()=>{
                  const previewPatient={...patient,frequency:ff.frequency,preferredDay:parseInt(ff.preferredDay),preferredTime:ff.preferredTime};
                  const s=computeNextSuggested(previewPatient,appointments);

                  return (

                      <div style={{fontSize:14,fontWeight:600,color:C.text}}>{s.date} · {s.time}</div>

            )}

            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
              <Btn variant="ghost" onClick={()=>setFM(false)}>Cancelar</Btn>
              <Btn onClick={saveFrequency}>Guardar</Btn>
            </div>
          </div>
        </Sheet>
      )}

      {/* ── NOTE MODAL ───────────────────────────────────────────────── */}
      {noteModal&&(
        <Sheet onClose={()=>setNM(false)} title={`Nota — ${patient.name}`}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",gap:10}}><div style={{flex:1}}><Fld label="Fecha" type="date" value={nf.date} onChange={v=>setNF(f=>({...f,date:v}))}/></div><div style={{width:90}}><Fld label="# Sesión" type="number" value={nf.session} onChange={v=>setNF(f=>({...f,session:v}))} placeholder="Auto"/></div></div>
            <Fld label="Notas" value={nf.content} onChange={v=>setNF(f=>({...f,content:v}))} rows={5} placeholder="Observaciones, avances..."/>
            <div style={{background:C.bg,borderRadius:8,padding:"8px 12px",fontSize:11,color:C.muted}}>🔒 Solo visible para ti</div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setNM(false)}>Cancelar</Btn><Btn onClick={addNote} disabled={!nf.content}>Guardar</Btn></div>
          </div>
        </Sheet>

      {/* ── PAY MODAL ────────────────────────────────────────────────── */}
      {payModal&&(
        <Sheet onClose={()=>setPM(false)} title={`Cobro — ${patient.name}`}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Fld label="Fecha" type="date" value={pf.date} onChange={v=>setPF(f=>({...f,date:v}))}/>
            <Fld label="Monto (pesos)" type="number" value={pf.amount} onChange={v=>setPF(f=>({...f,amount:v}))} placeholder={String(DEFAULT_FEE)}/>
            <div style={{display:"flex",gap:6}}>{[1000,1500,2000,2500,3000].map(a=>(<button key={a} onClick={()=>setPF(f=>({...f,amount:String(a)}))} style={{flex:1,background:pf.amount===String(a)?C.accent:C.surface,color:pf.amount===String(a)?"#fff":C.muted,border:`1px solid ${pf.amount===String(a)?C.accent:C.border}`,borderRadius:8,padding:"7px 0",fontSize:11,fontWeight:500}}>${a/1000}k</button>))}</div>
            <Fld label="Método" value={pf.method} onChange={v=>setPF(f=>({...f,method:v}))} options={[{v:"efectivo",l:"💵 Efectivo"},{v:"digital",l:"📱 Digital"}]}/>

            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setPM(false)}>Cancelar</Btn><Btn onClick={addPay} disabled={!pf.amount}>Registrar</Btn></div>
          </div>
        </Sheet>
      )}
    </div>
  );
}

// ── PACIENTES ─────────────────────────────────────────────────────────────────
function Pacientes({data,setData}){
  const [sel,setSel]=useState(null);
  const [addModal,setAddModal]=useState(false);
  const [form,setForm]=useState({name:"",phone:"",email:"",since:TODAY});
  const {patients,appointments,payments,notes}=data;

  const addPatient=()=>{
    if(!form.name.trim())return;
    setData(d=>({...d,patients:[...d.patients,{id:Date.now(),name:form.name.trim(),phone:form.phone.trim(),email:form.email.trim(),since:form.since||TODAY}]}));
    setAddModal(false);setForm({name:"",phone:"",email:"",since:TODAY});
  };
  const deletePatient=id=>{
    if(!confirm("¿Eliminar este paciente? Se borrarán también sus citas, pagos y notas."))return;
    setData(d=>({...d,patients:d.patients.filter(p=>p.id!==id),appointments:d.appointments.filter(a=>a.patientId!==id),payments:d.payments.filter(p=>p.patientId!==id),notes:d.notes.filter(n=>n.patientId!==id)}));
  };

  if(sel) return <PatientProfile patient={sel} data={data} setData={setData} onBack={()=>setSel(null)}/>;
  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <div><h2 style={{fontFamily:"Fraunces",fontSize:22,fontWeight:400}}>Pacientes</h2><p style={{color:C.muted,fontSize:13}}>{patients.length} registrados</p></div>
        <Btn small onClick={()=>setAddModal(true)}>+ Agregar</Btn>
      </div>
      {patients.length===0?(
        <Card style={{textAlign:"center",padding:48}}>
          <div style={{fontSize:40,marginBottom:12}}>👤</div>
          <div style={{fontWeight:600,marginBottom:6}}>Sin pacientes aún</div>
          <div style={{color:C.muted,fontSize:13,marginBottom:20}}>Agrega tu primer paciente para comenzar</div>
          <Btn onClick={()=>setAddModal(true)}>+ Agregar paciente</Btn>
        </Card>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {patients.map(p=>{
            const pend=payments.filter(x=>x.patientId===p.id&&x.status==="pending").reduce((s,x)=>s+x.amount,0);
            const appts=appointments.filter(a=>a.patientId===p.id);
            const next=appts.find(a=>a.date>=TODAY&&a.status!=="cancelled");
            const nn=notes.filter(n=>n.patientId===p.id).length;
            return (
              <Card key={p.id} style={{padding:"13px 14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <Av name={p.name}/>
                  <div style={{flex:1,cursor:"pointer"}} onClick={()=>setSel(p)}>
                    <div style={{fontWeight:600,fontSize:14}}>{p.name}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>{appts.length} sesiones · {nn} notas{next?` · 📅 ${next.date}`:""}{p.frequency&&p.frequency!=="none"?` · 🔁 ${p.frequency==="weekly"?"Sem.":"Qnc."}`:""}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    {pend>0&&<Badge color={C.yellow}>${pend.toLocaleString()}</Badge>}
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setSel(p)} style={{background:"none",color:C.muted,fontSize:18,padding:"2px 6px"}}>›</button>
                      <button onClick={e=>{e.stopPropagation();deletePatient(p.id);}} style={{background:C.red+"22",border:`1px solid ${C.red}33`,borderRadius:6,color:C.red,fontSize:11,padding:"3px 8px"}}>✕</button>
                    </div>
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
      )}
      {addModal&&(
        <Sheet onClose={()=>setAddModal(false)} title="Nuevo Paciente">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <Fld label="Nombre completo *" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nombre Apellido"/>
            <Fld label="Teléfono" value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} placeholder="+52 55 0000 0000" type="tel"/>
            <Fld label="Correo electrónico" value={form.email} onChange={v=>setForm(f=>({...f,email:v}))} placeholder="correo@ejemplo.com" type="email"/>
            <Fld label="Fecha de inicio" value={form.since} onChange={v=>setForm(f=>({...f,since:v}))} type="date"/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setAddModal(false)}>Cancelar</Btn><Btn onClick={addPatient} disabled={!form.name.trim()}>Agregar</Btn></div>
          </div>
        </Sheet>
      )}
    </div>
  );
}

// ── AGENDA ────────────────────────────────────────────────────────────────────
function Agenda({data,setData,slotDays,setSlotDays}){
  const {appointments,patients}=data;
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({patientId:"",date:TODAY,time:"09:00",fee:String(DEFAULT_FEE),status:"confirmed"});
  const [viewMode,setViewMode]=useState("week"); // "week" | "day"
  const [selDate,setSelDate]=useState(TODAY);

  // Compute the Monday of the week containing selDate
  const getWeekStart=useCallback(d=>{
    const base=new Date(d+"T12:00:00");
    const dow=base.getDay(); // 0=Sun
    const diff=dow===0?-6:1-dow; // go back to Monday
    base.setDate(base.getDate()+diff);
    return base.toISOString().split("T")[0];
  },[]);

  const [weekStart,setWeekStart]=useState(()=>getWeekStart(TODAY));

  // 5 weekdays Mon–Fri
  const weekDays=useMemo(()=>
    Array.from({length:5},(_,i)=>addDays(weekStart,i))
  ,[weekStart]);

  const prevWeek=()=>setWeekStart(d=>addDays(d,-7));
  const nextWeek=()=>setWeekStart(d=>addDays(d,7));
  const goToday=()=>{const ws=getWeekStart(TODAY);setWeekStart(ws);setSelDate(TODAY);};

  const add=()=>{
    const p=patients.find(p=>p.id===parseInt(form.patientId));if(!p)return;
    setData(d=>({...d,appointments:[...d.appointments,{id:Date.now(),patientId:p.id,patientName:p.name,date:form.date,time:form.time,duration:50,status:form.status,fee:parseInt(form.fee)||DEFAULT_FEE}]}));
    setModal(false);
    setWeekStart(getWeekStart(form.date));
  };

  const bookSlot=(date,time)=>{setForm(f=>({...f,date,time}));setModal(true);};
  const toggle=id=>setData(d=>({...d,appointments:d.appointments.map(a=>a.id===id?{...a,status:a.status==="confirmed"?"done":a.status==="done"?"cancelled":"confirmed"}:a)}));

  const SC={confirmed:C.accent,done:C.green,pending:C.yellow,cancelled:C.muted};
  const SL={confirmed:"Confirmada",done:"Realizada",pending:"Pendiente",cancelled:"Cancelada"};
  const SC_BG={confirmed:C.accent+"22",done:C.green+"22",pending:C.yellow+"22",cancelled:C.muted+"11"};

  // Get appointment at a specific date+time
  const apptAt=(date,time)=>appointments.filter(a=>a.date===date&&a.time===time&&a.status!=="cancelled");

  // Month/week label
  const weekLabel=useMemo(()=>{
    const s=new Date(weekStart+"T12:00:00");
    const e=new Date(weekDays[4]+"T12:00:00");
    const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    if(s.getMonth()===e.getMonth()) return `${months[s.getMonth()]} ${s.getFullYear()}`;
    return `${months[s.getMonth()]}–${months[e.getMonth()]} ${e.getFullYear()}`;
  },[weekStart,weekDays]);

  const todayInWeek=weekDays.includes(TODAY);
  const COL_W = 52; // px per day column

  return (
    <div className="fi">
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div>
          <h2 style={{fontFamily:"Fraunces",fontSize:22,fontWeight:400}}>Agenda</h2>
          <div style={{fontSize:12,color:C.muted,marginTop:1}}>{weekLabel}</div>
        </div>
        <div style={{display:"flex",gap:6}}>
          {!todayInWeek&&<button onClick={goToday} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:11,padding:"5px 10px"}}>Hoy</button>}
          <button onClick={prevWeek} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:14,padding:"5px 10px"}}>‹</button>
          <button onClick={nextWeek} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:14,padding:"5px 10px"}}>›</button>
          <Btn small onClick={()=>{setForm(f=>({...f,date:selDate}));setModal(true);}}>+ Cita</Btn>
        </div>
      </div>

      {/* Free slots */}
      <FreeSlots appointments={appointments} onBook={bookSlot} days={slotDays} setDays={setSlotDays}/>

      {/* ── WEEKLY GRID ─────────────────────────────────────────────── */}
      <div style={{overflowX:"auto",overflowY:"visible",WebkitOverflowScrolling:"touch",marginLeft:-14,marginRight:-14,paddingLeft:14}}>
        <div style={{minWidth:340}}>
          {/* Day header row */}
          <div style={{display:"flex",marginBottom:2,paddingLeft:36}}>
            {weekDays.map(d=>{
              const dow=new Date(d+"T12:00:00").getDay();
              const dayNum=new Date(d+"T12:00:00").getDate();
              const isToday=d===TODAY;
              const hasCita=appointments.some(a=>a.date===d&&a.status!=="cancelled");
              return (
                <div key={d} style={{width:COL_W,flexShrink:0,textAlign:"center",padding:"6px 2px"}}>
                  <div style={{fontSize:10,color:C.muted,fontWeight:500,marginBottom:3}}>{WDAYS[dow]}</div>
                  <div style={{width:28,height:28,borderRadius:"50%",background:isToday?C.accent:"transparent",color:isToday?"#fff":C.text,fontSize:13,fontWeight:isToday?700:500,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto"}}>
                    {dayNum}
                  </div>
                  {hasCita&&<div style={{width:4,height:4,borderRadius:"50%",background:isToday?C.al:C.accent,margin:"3px auto 0"}}/>}
                </div>
              );
            })}
          </div>

          {/* Time rows */}
          <div style={{position:"relative"}}>
            {WORK_HOURS.map(hour=>{
              const [hh]=hour.split(":").map(Number);
              const isCurrentHour=(()=>{const n=new Date();return n.toISOString().split("T")[0]===TODAY&&n.getHours()===hh;})();
              return (
                <div key={hour} style={{display:"flex",minHeight:52,borderTop:`1px solid ${C.border}22`,position:"relative"}}>
                  {/* Time label */}
                  <div style={{width:36,flexShrink:0,paddingTop:4,fontSize:10,color:isCurrentHour?C.accent:C.muted,fontWeight:isCurrentHour?600:400,textAlign:"right",paddingRight:6}}>
                    {hour}
                  </div>
                  {/* Day columns */}
                  {weekDays.map(d=>{
                    const appts=apptAt(d,hour);
                    const isEmpty=appts.length===0;
                    return (
                      <div key={d} style={{width:COL_W,flexShrink:0,padding:"2px 3px",borderLeft:`1px solid ${C.border}22`,position:"relative",minHeight:52}}>
                        {isEmpty?(
                          // Empty slot — tap to add
                          <button onClick={()=>bookSlot(d,hour)} style={{width:"100%",height:46,borderRadius:6,background:"transparent",border:"none",cursor:"pointer",opacity:0}}
                            aria-label={`Agendar ${d} ${hour}`}/>
                        ):(
                          appts.map(a=>(
                            <div key={a.id} onClick={()=>toggle(a.id)}
                              style={{background:SC_BG[a.status],border:`1px solid ${SC[a.status]}55`,borderRadius:6,padding:"3px 5px",cursor:"pointer",marginBottom:2,minHeight:42}}>
                              <div style={{fontSize:10,color:SC[a.status],fontWeight:700,lineHeight:1.2,marginBottom:1}}>{a.time}</div>
                              <div style={{fontSize:10,color:C.text,lineHeight:1.2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:COL_W-12}}>
                                {a.patientName.split(" ")[0]}
                              </div>
                              <div style={{fontSize:9,color:C.muted,marginTop:1}}>{SL[a.status].slice(0,4)}</div>
                            </div>
                          ))
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Tap-to-book hint */}
      <div style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:10,marginBottom:4}}>
        Toca una celda vacía para agendar · Toca una cita para cambiar estado
      </div>

      {/* New appointment modal */}
      {modal&&(
        <Sheet onClose={()=>setModal(false)} title="Nueva Cita">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {patients.length===0?(
              <div style={{textAlign:"center",padding:20,color:C.muted,fontSize:13}}>Primero agrega pacientes en la sección Pacientes 👤</div>
            ):(
              <>
                <Fld label="Paciente" value={form.patientId} onChange={v=>setForm(f=>({...f,patientId:v}))} options={[{v:"",l:"Seleccionar..."}, ...patients.map(p=>({v:p.id,l:p.name}))]}/>
                <div style={{display:"flex",gap:10}}>
                  <div style={{flex:1}}><Fld label="Fecha" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/></div>
                  <div style={{width:110}}><Fld label="Hora" type="time" value={form.time} onChange={v=>setForm(f=>({...f,time:v}))}/></div>
                </div>
                <Fld label="Honorario (pesos)" type="number" value={form.fee} onChange={v=>setForm(f=>({...f,fee:v}))} placeholder={String(DEFAULT_FEE)}/>
                <Fld label="Estado" value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={[{v:"confirmed",l:"Confirmada"},{v:"pending",l:"Pendiente"}]}/>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn>
                  <Btn onClick={add} disabled={!form.patientId}>Guardar</Btn>
                </div>
              </>
            )}
          </div>
        </Sheet>
      )}
    </div>
  );
}

// ── PAGOS ─────────────────────────────────────────────────────────────────────
function Pagos({data,setData}){
  const {payments,patients}=data;
  const [modal,setModal]=useState(false);
  const [month,setMonth]=useState(TODAY.slice(0,7));
  const [form,setForm]=useState({patientId:"",amount:String(DEFAULT_FEE),method:"efectivo",concept:"",date:TODAY});
  const fil=payments.filter(p=>p.date.startsWith(month));
  const paid=fil.filter(p=>p.status==="paid").reduce((s,p)=>s+p.amount,0);
  const pend=fil.filter(p=>p.status==="pending").reduce((s,p)=>s+p.amount,0);
  const efec=fil.filter(p=>p.method==="efectivo"&&p.status==="paid").reduce((s,p)=>s+p.amount,0);
  const dig=fil.filter(p=>p.method==="digital"&&p.status==="paid").reduce((s,p)=>s+p.amount,0);
  const add=()=>{const p=patients.find(p=>p.id===parseInt(form.patientId));if(!p)return;setData(d=>({...d,payments:[...d.payments,{id:Date.now(),patientId:p.id,patientName:p.name,date:form.date,amount:parseInt(form.amount),method:form.method,concept:form.concept||"Pago",status:"paid"}]}));setModal(false);setForm({patientId:"",amount:String(DEFAULT_FEE),method:"efectivo",concept:"",date:TODAY});};
  const MC={efectivo:C.green,digital:C.accent,pendiente:C.yellow};
  const ML={efectivo:"Efectivo",digital:"Digital",pendiente:"Pendiente"};
  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><h2 style={{fontFamily:"Fraunces",fontSize:22,fontWeight:400}}>Pagos</h2><p style={{color:C.muted,fontSize:13}}>Control de ingresos</p></div>
        <Btn onClick={()=>setModal(true)}>+ Registrar</Btn>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:10}}><Stat label="Cobrado" value={`$${paid.toLocaleString()}`} sub={`${fil.filter(p=>p.status==="paid").length} pagos`} color={C.green}/><Stat label="Por cobrar" value={`$${pend.toLocaleString()}`} color={C.yellow}/></div>
      <div style={{display:"flex",gap:10,marginBottom:16}}><Stat label="💵 Efectivo" value={`$${efec.toLocaleString()}`}/><Stat label="📱 Digital" value={`$${dig.toLocaleString()}`}/></div>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
        <label style={{fontSize:12,color:C.muted}}>Mes:</label>
        <input type="month" value={month} onChange={e=>setMonth(e.target.value)} style={{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",fontSize:12}}/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {fil.length===0?<Card style={{textAlign:"center",padding:32,color:C.muted}}>Sin registros este mes</Card>
        :[...fil].sort((a,b)=>b.date.localeCompare(a.date)).map(p=>(
          <Card key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px"}}>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{p.patientName}</div><div style={{fontSize:11,color:C.muted}}>{p.concept} · {p.date}</div></div>
            <Badge color={MC[p.method]}>{ML[p.method]}</Badge>
            <div style={{fontSize:14,fontWeight:600,color:p.status==="paid"?C.green:C.yellow}}>${p.amount.toLocaleString()}</div>
          </Card>
        ))}
      </div>
      {modal&&(
        <Sheet onClose={()=>setModal(false)} title="Registrar Pago">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {patients.length===0?<div style={{textAlign:"center",padding:20,color:C.muted,fontSize:13}}>Primero agrega pacientes 👤</div>:(
              <>
                <Fld label="Paciente" value={form.patientId} onChange={v=>setForm(f=>({...f,patientId:v}))} options={[{v:"",l:"Seleccionar..."}, ...patients.map(p=>({v:p.id,l:p.name}))]}/>
                <Fld label="Fecha" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
                <Fld label="Monto (pesos)" type="number" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} placeholder={String(DEFAULT_FEE)}/>
                <div style={{display:"flex",gap:6}}>{[1000,1500,2000,2500,3000].map(a=>(<button key={a} onClick={()=>setForm(f=>({...f,amount:String(a)}))} style={{flex:1,background:form.amount===String(a)?C.accent:C.surface,color:form.amount===String(a)?"#fff":C.muted,border:`1px solid ${form.amount===String(a)?C.accent:C.border}`,borderRadius:8,padding:"7px 0",fontSize:11,fontWeight:500}}>${a/1000}k</button>))}</div>
                <Fld label="Método" value={form.method} onChange={v=>setForm(f=>({...f,method:v}))} options={[{v:"efectivo",l:"💵 Efectivo"},{v:"digital",l:"📱 Digital"}]}/>
                <Fld label="Concepto" value={form.concept} onChange={v=>setForm(f=>({...f,concept:v}))} placeholder="Sesión #7"/>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={add} disabled={!form.patientId}>Guardar</Btn></div>
              </>
            )}
          </div>
        </Sheet>
      )}
    </div>
  );
}

// ── PERFIL ────────────────────────────────────────────────────────────────────
function Perfil({data,setData}){
  const therapist=data.therapist;
  const [editing,setEditing]=useState(!therapist.name);
  const [draft,setDraft]=useState(therapist);
  const [shareModal,setSM]=useState(false);
  const [copied,setCopied]=useState("");
  const [apiKeyInput,setApiKeyInput]=useState(data.apiKey||"");
  const [apiKeySaved,setApiKeySaved]=useState(false);

  const save=()=>{setData(d=>({...d,therapist:draft}));setEditing(false);};
  const cancel=()=>{setDraft(therapist);setEditing(false);};
  const addPM=()=>setDraft(d=>({...d,payments:[...d.payments,{id:Date.now(),label:"Nuevo medio",value:""}]}));
  const rmPM=id=>setDraft(d=>({...d,payments:d.payments.filter(p=>p.id!==id)}));
  const upPM=(id,field,val)=>setDraft(d=>({...d,payments:d.payments.map(p=>p.id===id?{...p,[field]:val}:p)}));
  const copy=(text,key)=>{navigator.clipboard?.writeText(text).then(()=>{setCopied(key);setTimeout(()=>setCopied(""),2000);}).catch(()=>{});};
  const shareText=()=>{const t=therapist;return[t.name||"Terapeuta",t.specialty,t.cedula?"Cédula: "+t.cedula:"","",t.address?"📍 "+t.address:"",t.phone?"📞 "+t.phone:"",t.email?"✉ "+t.email:"","","💳 Medios de pago:",...t.payments.filter(p=>p.value).map(p=>"  "+p.label+": "+p.value)].filter(Boolean).join("\n");};
  const saveApiKey=()=>{setData(d=>({...d,apiKey:apiKeyInput.trim()}));setApiKeySaved(true);setTimeout(()=>setApiKeySaved(false),2000);};

  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><h2 style={{fontFamily:"Fraunces",fontSize:22,fontWeight:400}}>Mi Perfil</h2></div>
        <div style={{display:"flex",gap:8}}>
          {!editing&&<Btn variant="ghost" small onClick={()=>setSM(true)}>📤</Btn>}
          {!editing?<Btn small onClick={()=>{setDraft(therapist);setEditing(true);}}>✏ Editar</Btn>:<><Btn variant="ghost" small onClick={cancel}>Cancelar</Btn><Btn small onClick={save}>Guardar</Btn></>}
        </div>
      </div>
      <Card style={{marginBottom:14,background:`linear-gradient(135deg,${C.card},${C.surface})`}}>
        <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:12}}>
          <div style={{width:54,height:54,borderRadius:"50%",background:C.accent+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:C.al,flexShrink:0}}>{therapist.name?therapist.name.split(" ").map(n=>n[0]).join("").slice(0,2):"👤"}</div>
          <div><div style={{fontFamily:"Fraunces",fontSize:17,fontWeight:400}}>{therapist.name||<span style={{color:C.muted,fontStyle:"italic",fontSize:13}}>Sin nombre</span>}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{therapist.specialty}</div>{therapist.cedula&&<div style={{fontSize:11,color:C.muted}}>Céd: {therapist.cedula}</div>}</div>
        </div>
        {!editing&&<div style={{display:"flex",flexDirection:"column",gap:4}}>{therapist.address&&<div style={{fontSize:12,color:C.muted}}>📍 {therapist.address}</div>}{therapist.phone&&<div style={{fontSize:12,color:C.muted}}>📞 {therapist.phone}</div>}{therapist.email&&<div style={{fontSize:12,color:C.muted}}>✉ {therapist.email}</div>}</div>}
      </Card>
      {editing&&(
        <Card style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:14}}>Datos personales</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Fld label="Nombre completo" value={draft.name} onChange={v=>setDraft(d=>({...d,name:v}))} placeholder="Dra. / Lic. Nombre Apellido"/>
            <Fld label="Especialidad" value={draft.specialty} onChange={v=>setDraft(d=>({...d,specialty:v}))} placeholder="Psicología Clínica"/>
            <Fld label="Cédula profesional" value={draft.cedula} onChange={v=>setDraft(d=>({...d,cedula:v}))} placeholder="12345678"/>
            <Fld label="Dirección" value={draft.address} onChange={v=>setDraft(d=>({...d,address:v}))} placeholder="Calle, Colonia, Ciudad"/>
            <Fld label="Teléfono / WhatsApp" value={draft.phone} onChange={v=>setDraft(d=>({...d,phone:v}))} placeholder="+52 55 0000 0000" type="tel"/>
            <Fld label="Correo electrónico" value={draft.email} onChange={v=>setDraft(d=>({...d,email:v}))} placeholder="correo@ejemplo.com" type="email"/>
          </div>
        </Card>
      )}

      {/* API KEY SECTION */}
      <Card style={{marginBottom:14,borderColor:data.apiKey?C.green+"44":C.border}}>
        <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>🤖 API Key — Chat IA</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.6}}>
          Para usar el chat con IA necesitas una API key de Anthropic.<br/>
          Obtén una gratis en <span style={{color:C.al}}>console.anthropic.com</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} type="password" placeholder="sk-ant-api03-..." style={{flex:1,background:C.surface,color:C.text,border:`1px solid ${data.apiKey?C.green+"66":C.border}`,borderRadius:8,padding:"10px 12px",fontSize:13}}/>
          <button onClick={saveApiKey} style={{background:apiKeySaved?C.green:C.accent,color:"#fff",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:500,flexShrink:0}}>
            {apiKeySaved?"✓":"Guardar"}
          </button>
        </div>
        {data.apiKey&&<div style={{fontSize:11,color:C.green,marginTop:6}}>✓ API key configurada — chat activo</div>}
      </Card>

      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5}}>💳 Medios de pago</div>
          {editing&&<Btn variant="ghost" small onClick={addPM}>+ Agregar</Btn>}
        </div>
        {(editing?draft.payments:therapist.payments).length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"14px 0"}}>Sin medios configurados</div>}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {(editing?draft.payments:therapist.payments).map(pm=>(
            <div key={pm.id}>
              {editing?(
                <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                  <div style={{flex:1}}><Fld label="Tipo" value={pm.label} onChange={v=>upPM(pm.id,"label",v)} placeholder="CLABE, Mercado Pago..."/></div>
                  <div style={{flex:2}}><Fld label="Cuenta" value={pm.value} onChange={v=>upPM(pm.id,"value",v)} placeholder="0000..."/></div>
                  <button onClick={()=>rmPM(pm.id)} style={{background:C.red+"22",border:`1px solid ${C.red}44`,borderRadius:8,color:C.red,padding:"10px 10px",fontSize:14,flexShrink:0}}>✕</button>
                </div>
              ):(
                <div style={{background:C.surface,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div><div style={{fontSize:11,color:C.muted,marginBottom:2}}>{pm.label}</div><div style={{fontSize:14,fontWeight:500,fontFamily:"monospace"}}>{pm.value||<span style={{color:C.muted,fontStyle:"italic",fontFamily:"inherit",fontSize:12}}>Sin configurar</span>}</div></div>
                  {pm.value&&<button onClick={()=>copy(pm.value,pm.id)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,color:copied===pm.id?C.green:C.muted,padding:"6px 12px",fontSize:12}}>{copied===pm.id?"✓":"Copiar"}</button>}
                </div>
              )}
            </div>
          ))}
        </div>
      </Card>
      {shareModal&&(
        <Sheet onClose={()=>setSM(false)} title="Compartir datos de pago">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:C.bg,borderRadius:10,padding:"14px",fontSize:12,lineHeight:1.8,whiteSpace:"pre-line",fontFamily:"monospace",border:`1px solid ${C.border}`,color:C.text}}>{shareText()}</div>
            <div style={{display:"flex",gap:8}}><Btn full onClick={()=>copy(shareText(),"all")}>{copied==="all"?"✓ Copiado":"📋 Copiar"}</Btn>{navigator.share&&<Btn variant="ghost" full onClick={()=>navigator.share({title:"Datos de pago",text:shareText()}).catch(()=>{})}>📤 Compartir</Btn>}</div>
          </div>
        </Sheet>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [data,setData]=useState(()=>loadData());
  const [tab,setTab]=useState("pacientes");
  const [slotDays,setSlotDays]=useState(7);
  const dataRef=useRef(data);
  useEffect(()=>{dataRef.current=data;},[data]);
  useEffect(()=>saveData(data),[data]);

  const {requestPerm, prompt, resolvePrompt, dismissPrompt} = useNotifications(data, setData);

  // Request notification permission on first load
  useEffect(()=>{ requestPerm(); },[]);

  const tabs=[{id:"pacientes",l:"Pacientes",icon:"👤"},{id:"agenda",l:"Agenda",icon:"📅"},{id:"pagos",l:"Pagos",icon:"💳"},{id:"chat",l:"Asistente",icon:"🌿"},{id:"perfil",l:"Perfil",icon:"🪪"}];
  const pendN=data.payments.filter(p=>p.status==="pending").length;
  const todayN=data.appointments.filter(a=>a.date===TODAY).length;

  return (
    <div style={{minHeight:"100vh",background:C.bg,maxWidth:560,margin:"0 auto"}}>
      <div style={{padding:"14px 16px 12px",borderBottom:`1px solid ${C.border}`,position:"sticky",top:0,background:C.bg,zIndex:50}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <h1 style={{fontFamily:"Fraunces",fontSize:22,fontWeight:300,letterSpacing:-.5}}><span style={{fontStyle:"italic",color:C.al}}>Sonia</span></h1>
            <p style={{fontSize:10,color:C.muted,marginTop:1}}>{data.therapist.name||"Asistente de consultorio"}</p>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {todayN>0&&<Badge color={C.accent}>{todayN} hoy</Badge>}
            {pendN>0&&<Badge color={C.yellow}>${data.payments.filter(p=>p.status==="pending").reduce((s,p)=>s+p.amount,0).toLocaleString()}</Badge>}
          </div>
        </div>
      </div>
      <div style={{padding:"14px 14px 110px"}}>
        {tab==="pacientes"&&<Pacientes data={data} setData={setData}/>}
        {tab==="agenda"&&<Agenda data={data} setData={setData} slotDays={slotDays} setSlotDays={setSlotDays}/>}
        {tab==="pagos"&&<Pagos data={data} setData={setData}/>}
        {tab==="chat"&&<Chatbot dataRef={dataRef} setData={setData} setTab={setTab}/>}
        {tab==="perfil"&&<Perfil data={data} setData={setData}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:560,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",padding:"6px 0 env(safe-area-inset-bottom,10px)",zIndex:60}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"7px 0",color:tab===t.id?C.accent:C.muted,display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"color .15s",position:"relative"}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:500,letterSpacing:.2}}>{t.l}</span>
            {t.id==="pagos"&&pendN>0&&<div style={{position:"absolute",top:4,right:"18%",width:7,height:7,borderRadius:"50%",background:C.yellow}}/>}
          </button>
        ))}
      </div>
      {tab!=="chat"&&<MicButton dataRef={dataRef} setData={setData} setTab={setTab} setSlotDays={setSlotDays}/>}

      {/* Session confirmation prompt — appears ~1hr after appointment ends */}
      {prompt&&(
        <SessionPrompt
          appt={prompt}
          patients={data.patients}
          onResolve={resolvePrompt}
          onDismiss={dismissPrompt}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- Register service worker from same origin (required for PWA install) -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW registration failed:', e));
  });
}
</script>

<!-- Android/Chrome install prompt -->
<script>
let _dp = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _dp = e;
  // Show after 4 seconds
  setTimeout(() => {
    if (!_dp) return;
    const banner = document.createElement('div');
    banner.id = 'install-banner';
    banner.innerHTML = `
      <div style="position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:528px;background:#1e2235;border:1px solid #2a3050;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.6);font-family:'DM Sans',sans-serif;">
        <div style="display:flex;align-items:center;gap:12px;">
          <img src="icon-192.png" width="36" height="36" style="border-radius:8px;"/>
          <div>
            <div style="color:#e8eaf6;font-size:13px;font-weight:600;">Instalar Sonia</div>
            <div style="color:#7b83a6;font-size:11px;">App de consultorio</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button id="sonia-dismiss" style="background:transparent;border:1px solid #2a3050;color:#7b83a6;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;">No</button>
          <button id="sonia-install" style="background:#6c8fff;border:none;color:#fff;padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit;">Instalar</button>
        </div>
      </div>`;
    document.body.appendChild(banner);
    document.getElementById('sonia-install').onclick = () => {
      _dp.prompt();
      _dp.userChoice.then(() => { banner.remove(); _dp = null; });
    };
    document.getElementById('sonia-dismiss').onclick = () => banner.remove();
  }, 4000);
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner')?.remove();
  _dp = null;
});
</script>
</body>
</html>

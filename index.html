const {useState,useEffect,useRef,useCallback,useMemo} = React;

// ── CONSTANTS ────────────────────────────────────────────────────────────────
// Half-hour slots 07:00–20:00
const WORK_SLOTS = Array.from({length:27},(_,i)=>{
  const h=Math.floor(i/2)+7, m=i%2===0?"00":"30";
  return `${String(h).padStart(2,"0")}:${m}`;
}); // 07:00,07:30,...,19:30,20:00
const WORK_HOURS = WORK_SLOTS; // alias for backward compat
const DEFAULT_FEE = 2000;
// TODAY is a function so it's always current (not frozen at page load)
function getToday(){return new Date().toISOString().split("T")[0];}
const TODAY = getToday(); // used for initial state only; components use getToday()
function addDays(s,n){const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function fmtSlot(s){return s;} // "HH:MM"

// Day/time helpers
const WDAYS = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const WDAYS_FULL = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

// Payment scheme labels
const PAY_SCHEME_LABELS = {
  per_session:      "Por sesión",
  weekly:           "Semanal",
  monthly_advance:  "Mensual adelantado",
  monthly_arrears:  "Mensual vencido",
};

// Default schedule: all days open 07:00–20:00, no blocked ranges
// daySchedule[dow] = [{from:"HH:MM",to:"HH:MM"}] — BLOCKED ranges
const DEFAULT_DAY_SCHEDULE = {0:[],1:[],2:[],3:[],4:[],5:[],6:[]};


// ── NOTIFICATION ENGINE ───────────────────────────────────────────────────────
function useNotifications(data, setData){
  const permRef = useRef(false);
  const morningTimerRef = useRef(null);

  const requestPerm = useCallback(async()=>{
    if(!('Notification' in window))return false;
    if(Notification.permission==="granted"){permRef.current=true;return true;}
    if(Notification.permission==="denied")return false;
    const r = await Notification.requestPermission();
    permRef.current = r==="granted";
    return permRef.current;
  },[]);

  const [prompt, setPrompt] = useState(null);

  // ── 6am daily briefing ─────────────────────────────────────────────────────
  useEffect(()=>{
    const scheduleMorning=()=>{
      if(morningTimerRef.current) clearTimeout(morningTimerRef.current);
      const now=new Date();
      const next6=new Date(now);
      next6.setHours(6,0,0,0);
      if(next6<=now) next6.setDate(next6.getDate()+1);
      const ms=next6-now;

      morningTimerRef.current=setTimeout(()=>{
        if(Notification.permission==="granted"){
          const todayStr=getToday();
          const todayAppts=data.appointments
            .filter(a=>a.date===todayStr&&a.status!=="cancelled")
            .sort((a,b)=>a.time.localeCompare(b.time));

          // Patients with no upcoming appointment at all
          const patientsWithFuture=new Set(data.appointments
            .filter(a=>a.date>=todayStr&&a.status!=="cancelled")
            .map(a=>a.patientId));
          const sinHora=data.patients.filter(p=>!patientsWithFuture.has(p.id));

          let body="";
          if(todayAppts.length>0){
            body+="Hoy: "+todayAppts.map(a=>`${a.time} ${a.patientName}`).join(", ")+".";
          } else {
            body+="Sin citas hoy.";
          }
          if(sinHora.length>0){
            body+=` Sin hora: ${sinHora.map(p=>p.name.split(" ")[0]).join(", ")}.`;
          }

          try{
            new Notification("🌿 Sonia — Agenda del día", {
              body,
              icon:"./icon-192.png",
              tag:"morning-brief",
            });
          }catch{}
        }
        scheduleMorning(); // reschedule for tomorrow
      }, ms);
    };
    scheduleMorning();
    return ()=>{ if(morningTimerRef.current) clearTimeout(morningTimerRef.current); };
  },[data.appointments, data.patients]);

  // ── Post-session confirmation check (every minute) ──────────────────────────
  useEffect(()=>{
    const check=()=>{
      const now=new Date();
      const todayStr=now.toISOString().split("T")[0];
      const nowMins=now.getHours()*60+now.getMinutes();
      const candidates=data.appointments.filter(a=>{
        if(a.date!==todayStr||a.status!=="confirmed"||a._prompted)return false;
        const [hh,mm]=a.time.split(":").map(Number);
        const endMins=hh*60+mm+50;
        const diff=nowMins-endMins;
        return diff>=5&&diff<=90;
      });
      if(candidates.length>0&&!prompt){
        const a=candidates[0];
        setPrompt(a);
        if(Notification.permission==="granted"){
          try{
            new Notification("Sonia — Confirmar sesión",{
              body:`¿Se realizó la sesión de ${a.patientName}? Abre Sonia para confirmar.`,
              icon:"./icon-192.png",
              tag:`session-${a.id}`,
            });
          }catch{}
        }
      }
    };
    const t=setInterval(check,60_000);
    check();
    return()=>clearInterval(t);
  },[data.appointments,prompt]);

  const resolvePrompt=useCallback((apptId,sessionDone,paymentDone,fee,method)=>{
    setData(d=>{
      let appts=d.appointments.map(a=>{
        if(a.id!==apptId)return a;
        return{...a,status:sessionDone?"done":"cancelled",_prompted:true};
      });
      let pays=d.payments;
      if(sessionDone&&paymentDone){
        const appt=d.appointments.find(a=>a.id===apptId);
        if(appt){
          pays=[...pays,{id:Date.now(),patientId:appt.patientId,patientName:appt.patientName,
            date:getToday(),amount:fee||DEFAULT_FEE,method:method||"efectivo",concept:`Sesión ${appt.time}`,status:"paid"}];
        }
      }
      return{...d,appointments:appts,payments:pays};
    });
    setPrompt(null);
  },[setData]);

  const dismissPrompt=useCallback((apptId)=>{
    setData(d=>({...d,appointments:d.appointments.map(a=>a.id===apptId?{...a,_prompted:true}:a)}));
    setPrompt(null);
  },[setData]);

  return{requestPerm,prompt,resolvePrompt,dismissPrompt};
}

// ── SESSION CONFIRM PROMPT ────────────────────────────────────────────────────
function SessionPrompt({appt, patients, onResolve, onDismiss}){
  const fee = appt.fee || DEFAULT_FEE;
  // step: "session" | "payment"
  const [step, setStep] = useState("session");

  return (
    <div className="ov" onClick={()=>onDismiss(appt.id)}>
      <div className="sh" onClick={e=>e.stopPropagation()} style={{paddingBottom:32}}>
        <div className="hdl"/>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:32,marginBottom:8}}>🔔</div>
          <div style={{fontFamily:"Fraunces",fontSize:18,fontWeight:400,marginBottom:4}}>
            {step==="session"?"¿Cómo salió la sesión?":"¿Cómo se cobró?"}
          </div>
          <div style={{fontSize:13,color:C.muted}}>{appt.patientName} · {appt.time} · ${fee.toLocaleString()}</div>
        </div>

        {step==="session"&&(
          <>
            <div style={{display:"flex",gap:10,marginBottom:20}}>
              <button onClick={()=>setStep("payment")}
                style={{flex:1,background:C.green+"22",border:`1px solid ${C.green}44`,borderRadius:12,padding:"16px 0",color:C.green,fontSize:14,fontWeight:600}}>
                ✓ Sí se realizó
              </button>
              <button onClick={()=>onResolve(appt.id,false,false,fee,"efectivo")}
                style={{flex:1,background:C.red+"22",border:`1px solid ${C.red}44`,borderRadius:12,padding:"16px 0",color:C.red,fontSize:14,fontWeight:600}}>
                ✗ No se realizó
              </button>
            </div>
            <div style={{textAlign:"center"}}>
              <button onClick={()=>onDismiss(appt.id)} style={{background:"none",color:C.muted,fontSize:12,padding:"8px 0"}}>
                Preguntar después
              </button>
            </div>
          </>
        )}

        {step==="payment"&&(
          <>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
              <button onClick={()=>onResolve(appt.id,true,true,fee,"efectivo")}
                style={{background:C.green+"22",border:`1px solid ${C.green}44`,borderRadius:12,padding:"14px 0",color:C.green,fontSize:14,fontWeight:600}}>
                💵 Cobré en efectivo
              </button>
              <button onClick={()=>onResolve(appt.id,true,true,fee,"digital")}
                style={{background:C.accent+"22",border:`1px solid ${C.accent}44`,borderRadius:12,padding:"14px 0",color:C.al,fontSize:14,fontWeight:600}}>
                📱 Cobré de forma digital
              </button>
              <button onClick={()=>onResolve(appt.id,true,false,fee,"efectivo")}
                style={{background:C.yellow+"22",border:`1px solid ${C.yellow}44`,borderRadius:12,padding:"14px 0",color:C.yellow,fontSize:14,fontWeight:600}}>
                ⏳ Queda pendiente de cobro
              </button>
            </div>
            <div style={{textAlign:"center"}}>
              <button onClick={()=>setStep("session")} style={{background:"none",color:C.muted,fontSize:12,padding:"4px 0"}}>
                ← Volver
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── VOICE ENGINE ─────────────────────────────────────────────────────────────
function useVoice(onResult){
  const [listening,setListening]=useState(false);
  const [status,setStatus]=useState("");
  const recRef=useRef(null);
  const permOk=useRef(false);

  const flash=useCallback(msg=>{setStatus(msg);setTimeout(()=>setStatus(""),4500);},[]);
  const speak=useCallback(txt=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang="es-ES";u.rate=1.05;
    setTimeout(()=>window.speechSynthesis.speak(u),80);
  },[]);

  const doRecognize=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){flash("⚠ Reconocimiento de voz no disponible en este navegador");return;}
    if(recRef.current){try{recRef.current.abort();}catch{}}
    const r=new SR();
    r.lang="es-ES";r.continuous=false;r.interimResults=false;r.maxAlternatives=5;
    r.onstart=()=>setListening(true);
    r.onresult=e=>{
      setListening(false);
      const txt=e.results[0][0].transcript;
      flash(`🎤 "${txt}"`);
      onResult(txt,speak,flash);
    };
    r.onerror=e=>{
      setListening(false);
      const msgs={"not-allowed":"❌ Permiso de micrófono denegado — ve a Configuración del sitio en Chrome","no-speech":"Sin audio, intenta de nuevo","network":"Sin conexión para reconocimiento","aborted":""};
      if(msgs[e.error]!==undefined)flash(msgs[e.error]);
      else flash(`❌ Error de micrófono: ${e.error}`);
    };
    r.onend=()=>setListening(false);
    recRef.current=r;
    try{r.start();}catch(err){flash("❌ No se pudo iniciar: "+err.message);}
  },[onResult,flash]);

  const start=useCallback(()=>{
    if(listening){try{recRef.current?.abort();}catch{}setListening(false);return;}
    if(!permOk.current&&navigator.mediaDevices?.getUserMedia){
      flash("🎙 Solicitando permiso de micrófono...");
      navigator.mediaDevices.getUserMedia({audio:true,video:false})
        .then(stream=>{
          stream.getTracks().forEach(t=>t.stop());
          permOk.current=true;
          doRecognize();
        })
        .catch(err=>{
          flash(err.name==="NotAllowedError"
            ?"❌ Micrófono bloqueado — toca el candado 🔒 en la barra de Chrome → Permisos del sitio → Micrófono → Permitir"
            :"❌ "+err.message);
        });
    } else {
      doRecognize();
    }
  },[listening,doRecognize,flash]);

  return {listening,status,start,speak,flash};
}

// ── VOICE COMMAND PROCESSOR ──────────────────────────────────────────────────
function processVoiceCommand(text,dataRef,setData,setTab,speak,flash,setSlotDays){
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
  const t=norm(text);
  const {patients,appointments,payments}=dataRef.current;
  const matchName=hint=>patients.find(p=>norm(p.name).split(" ").some(w=>hint.includes(w)&&w.length>2));

  // Day-of-week name → number
  const DOW_MAP={lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6,domingo:0,
    lun:1,mar:2,mie:3,mier:3,jue:4,vie:5,sab:6,dom:0};

  // NAV
  if(/(ir a|abrir|ver|mostrar)\s+(pacientes|inicio)/.test(t)){setTab("pacientes");speak("Pacientes");return;}
  if(/(ir a|abrir|ver|mostrar)\s+agenda/.test(t)){setTab("agenda");speak("Agenda");return;}
  if(/(ir a|abrir|ver|mostrar)\s+pagos/.test(t)){setTab("pagos");speak("Pagos");return;}
  if(/(ir a|abrir|ver|mostrar)\s+(chat|asistente|sonia)/.test(t)){setTab("chat");speak("Asistente");return;}
  if(/(ir a|abrir|ver|mostrar)\s+perfil/.test(t)){setTab("perfil");speak("Perfil");return;}

  // ADD NEW PATIENT: "agregar paciente [nombre apellido] [día] a las [hora]"
  // e.g. "agregar paciente Laura Soto los lunes a las 10"
  // e.g. "nuevo paciente Marcos Pérez miércoles 11"
  const newPRx=/(?:agregar|nuevo|añadir)\s+paciente\s+([a-záéíóúñü]+(?:\s+[a-záéíóúñü]+)+?)(?:\s+(?:los?\s+)?([a-záéíóúñü]+))?(?:\s+a\s+las?\s+(\d{1,2})(?::(\d{2}))?)?$/i;
  const newPM=t.match(newPRx);
  if(newPM&&(t.includes("paciente")||t.includes("nuevo"))){
    const fullName=newPM[1].trim().split(" ").map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" ");
    const dayWord=newPM[2]?norm(newPM[2]).replace(/s$/,""):null; // remove trailing 's' (lunes→lune→lun)
    const dow=dayWord?DOW_MAP[dayWord]??DOW_MAP[dayWord.slice(0,3)]??null:null;
    const h=newPM[3]?String(parseInt(newPM[3])).padStart(2,"0"):null;
    const time=h?`${h}:${newPM[4]||"00"}`:null;

    // Find the next occurrence of that day of week
    let apptDate=null;
    if(dow!==null&&time){
      const base=new Date(TODAY+"T12:00:00");
      let tries=0;
      while(base.getDay()!==dow&&tries<7){base.setDate(base.getDate()+1);tries++;}
      if(base.getDay()===dow) apptDate=base.toISOString().split("T")[0];
    }

    // Check if patient already exists
    const existing=patients.find(p=>norm(p.name)===norm(fullName));
    if(existing){
      if(apptDate&&time){
        setData(d=>({...d,appointments:[...d.appointments,{id:Date.now(),patientId:existing.id,patientName:existing.name,date:apptDate,time,duration:50,status:"confirmed",fee:DEFAULT_FEE}]}));
        speak(`Cita agendada para ${existing.name.split(" ")[0]}`);flash(`✓ Cita ${existing.name} ${apptDate} ${time}`);
      }else{
        speak(`${fullName} ya existe`);flash(`Ya existe: ${fullName}`);
      }
    }else{
      const newP={id:Date.now(),name:fullName,phone:"",email:"",since:TODAY};
      setData(d=>{
        const updated={...d,patients:[...d.patients,newP]};
        if(apptDate&&time){
          updated.appointments=[...d.appointments,{id:Date.now()+1,patientId:newP.id,patientName:newP.name,date:apptDate,time,duration:50,status:"confirmed",fee:DEFAULT_FEE}];
        }
        return updated;
      });
      const msg=apptDate&&time
        ?`Paciente ${fullName} agregado. Cita el ${apptDate} a las ${h}`
        :`Paciente ${fullName} agregado`;
      speak(msg);flash(`✓ ${fullName}${apptDate?` · ${apptDate} ${time}`:""}`);setTab("pacientes");
    }
    return;
  }

  // FREE SLOTS
  const slotM=t.match(/(?:buscar|mostrar|ver|busca|muestra)\s+(?:horas?\s+libres?|disponibilidad)(?:.*?(\d+)\s*dias?)?/);
  if(slotM){
    const n=slotM[1]?parseInt(slotM[1]):7;
    setTab("agenda");setSlotDays(n);
    speak(`Horas libres, ${n} días`);flash(`🔍 Disponibilidad: ${n} días`);return;
  }
  if(/horas?\s+libres?|disponibilidad|horario\s+libre/.test(t)){
    const n=t.includes("mañana")?2:t.includes("semana")?7:5;
    setTab("agenda");setSlotDays(n);speak("Mostrando disponibilidad");flash("🔍 Horas libres");return;
  }

  // REGISTER PAYMENT
  const payM=t.match(/(?:cobr|pago|registr)\S*\s+(?:de\s+|a\s+)?([a-z\s]+?)\s+([\d]+)/i);
  if(payM){
    const p=matchName(payM[1].trim());
    const amt=parseInt(payM[2]);
    if(p&&amt>0){
      setData(d=>({...d,payments:[...d.payments,{id:Date.now(),patientId:p.id,patientName:p.name,date:TODAY,amount:amt,method:"efectivo",concept:"Pago por voz",status:"paid"}]}));
      speak(`${amt} pesos de ${p.name.split(" ")[0]} registrados`);flash(`✓ $${amt.toLocaleString()} — ${p.name}`);setTab("pagos");
    }else if(!p){speak("No encontré ese paciente");flash("❌ Paciente no encontrado");}
    else{speak("Monto inválido");flash("❌ Monto inválido");}
    return;
  }

  // NEW APPOINTMENT (existing patient)
  const apM=t.match(/(?:agendar|crear|nueva|programar)\s+(?:una\s+)?(?:cita|sesion)\s+(?:para|con)\s+([a-z\s]+?)(?:\s+a\s+las?\s+(\d{1,2})(?::(\d{2}))?)?$/i);
  if(apM){
    const p=matchName((apM[1]||"").trim());
    if(p){
      const h=apM[2]?String(parseInt(apM[2])).padStart(2,"0"):"10";
      const time=`${h}:${apM[3]||"00"}`;
      setData(d=>({...d,appointments:[...d.appointments,{id:Date.now(),patientId:p.id,patientName:p.name,date:TODAY,time,duration:50,status:"confirmed",fee:DEFAULT_FEE}]}));
      speak(`Cita para ${p.name.split(" ")[0]} a las ${h}`);flash(`✓ Cita ${p.name.split(" ")[0]} ${time}`);setTab("agenda");
    }else{speak("No encontré ese paciente");flash("❌ Paciente no encontrado");}
    return;
  }

  // MARK DONE
  const doneM=t.match(/(?:marcar|completar|terminar)\s+(?:sesion|cita)?\s*(?:de|con)?\s*([a-z\s]+?)(?:\s+como\s+)?(?:realizada|hecha|completada)?$/i);
  if(doneM&&(t.includes("realiz")||t.includes("hecha")||t.includes("complet")||t.includes("marcar")||t.includes("terminar"))){
    const hint=norm(doneM[1]);
    const appt=[...appointments].reverse().find(a=>a.status==="confirmed"&&norm(a.patientName).split(" ").some(w=>hint.includes(w)&&w.length>2));
    if(appt){
      setData(d=>({...d,appointments:d.appointments.map(a=>a.id===appt.id?{...a,status:"done"}:a)}));
      speak(`Sesión de ${appt.patientName.split(" ")[0]} completada`);flash(`✓ Realizada — ${appt.patientName}`);
    }else{speak("No encontré esa cita");flash("❌ Cita no encontrada");}
    return;
  }

  // QUERIES
  if(/(pendiente|cobrar|saldo)/.test(t)){
    const total=payments.filter(p=>p.status==="pending").reduce((s,p)=>s+p.amount,0);
    speak(total>0?`${total.toLocaleString()} pesos pendientes`:"Sin cobros pendientes");flash(`Pendiente: $${total.toLocaleString()}`);return;
  }
  if(/(citas|sesiones).*(hoy)|hoy.*(citas|sesiones)/.test(t)){
    const n=appointments.filter(a=>a.date===TODAY).length;
    speak(`${n} cita${n!==1?"s":""} hoy`);flash(`Citas hoy: ${n}`);return;
  }
  if(/(cuantos|total).*(pacientes)/.test(t)){
    speak(`${patients.length} pacientes`);flash(`Pacientes: ${patients.length}`);return;
  }

  speak("No entendí, intenta de nuevo");flash("¿? No reconocido");
}

// ── FREE SLOTS ────────────────────────────────────────────────────────────────
function FreeSlots({appointments,onBook,days,setDays,daySchedule}){
  const [open,setOpen]=useState(true);
  const schedule=daySchedule||DEFAULT_DAY_SCHEDULE;
  const DN=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  const isBlocked=(dateStr,slot)=>{
    const dow=new Date(dateStr+"T12:00:00").getDay();
    const blocks=schedule[dow]||[];
    if(!blocks.length) return false;
    const [sh,sm]=slot.split(":").map(Number);
    const slotMin=sh*60+sm;
    return blocks.some(b=>{
      const [fh,fm]=b.from.split(":").map(Number);
      const [th,tm]=b.to.split(":").map(Number);
      return slotMin>=fh*60+fm && slotMin<th*60+tm;
    });
  };

  const results=useMemo(()=>{
    const today=getToday();
    const out=[];
    for(let d=0;d<days;d++){
      const base=new Date(today+"T12:00:00");base.setDate(base.getDate()+d);
      const ds=base.toISOString().split("T")[0];
      const dow=base.getDay();
      if(dow===0||dow===6)continue;

      // Build set of occupied minutes (each appointment blocks start → start+50 min)
      const occupiedMins=new Set();
      appointments.filter(a=>a.date===ds&&a.status!=="cancelled").forEach(a=>{
        const [hh,mm]=a.time.split(":").map(Number);
        const startMin=hh*60+mm;
        // Block every 30-min slot that overlaps the 50-min session
        for(let m=startMin;m<startMin+50;m+=30){
          occupiedMins.add(m);
        }
        // Also block the slot starting during the session
        for(let m=startMin;m<startMin+50;m++){
          occupiedMins.add(m);
        }
      });

      // Only show :00 slots; a slot is free if its start minute is not occupied
      const free=WORK_SLOTS.filter(h=>{
        if(!h.endsWith(":00"))return false;
        const [sh,sm]=h.split(":").map(Number);
        const slotMin=sh*60+sm;
        // Slot is free if no occupied minute falls within [slotMin, slotMin+50)
        for(let m=slotMin;m<slotMin+50;m++){
          if(occupiedMins.has(m))return false;
        }
        return !isBlocked(ds,h);
      });

      const busyCount=appointments.filter(a=>a.date===ds&&a.status!=="cancelled").length;
      if(free.length>0)out.push({date:ds,dow,slots:free,busy:busyCount});
    }
    return out;
  },[appointments,days,schedule]);

  const total=results.reduce((s,r)=>s+r.slots.length,0);
  return (
    <Card style={{marginBottom:16,borderColor:open?C.accent+"55":C.border}}>
      <div onClick={()=>setOpen(v=>!v)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",marginBottom:open?12:0}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}><span>🔍</span><span style={{fontWeight:600,fontSize:13}}>Horas libres</span><Badge color={C.green}>{total} disponibles</Badge></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={days} onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();setDays(parseInt(e.target.value));}}
            style={{background:C.surface,color:C.muted,border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 8px",fontSize:11}}>
            {[3,5,7,10,14].map(n=><option key={n} value={n}>{n} días</option>)}
          </select>
          <span style={{color:C.muted}}>{open?"▲":"▼"}</span>
        </div>
      </div>
      {open&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {results.filter(r=>r.slots.length>0).slice(0,6).map(({date,dow,slots,busy})=>(
            <div key={date}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:.4}}>{DN[dow]} {date}</span>
                {busy>0&&<span style={{fontSize:10,color:C.yellow}}>{busy} ocupada{busy>1?"s":""}</span>}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {slots.map(s=><button key={s} onClick={()=>onBook(date,s)} style={{background:C.green+"18",color:C.green,border:`1px solid ${C.green}44`,borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:500}}>{s}</button>)}
              </div>
            </div>
          ))}
          {results.every(r=>r.slots.length===0)&&<div style={{textAlign:"center",color:C.muted,fontSize:12}}>Sin horas libres</div>}
        </div>
      )}
    </Card>
  );
}

// ── FREQUENCY HELPERS ────────────────────────────────────────────────────────
const FREQ_LABELS = {none:"Sin frecuencia fija",weekly:"Semanal",biweekly:"Quincenal"};
const DAY_NAMES = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const DAY_SHORT = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

// Given a patient's frequency settings and their existing appointments, compute
// the next suggested date after the last confirmed/done appointment.
function computeNextSuggested(patient, appointments){
  const {frequency, preferredDay, preferredTime} = patient;
  if(!frequency || frequency==="none" || preferredDay===undefined || !preferredTime) return null;
  const intervalDays = frequency==="weekly" ? 7 : 14;
  const today=getToday();

  // Find the most recent confirmed/done appointment for this patient
  const pAppts = appointments
    .filter(a=>a.patientId===patient.id && (a.status==="confirmed"||a.status==="done"))
    .sort((a,b)=>b.date.localeCompare(a.date));

  let baseDate;
  if(pAppts.length>0){
    // Start from last appointment + interval
    baseDate = new Date(pAppts[0].date+"T12:00:00");
    baseDate.setDate(baseDate.getDate()+intervalDays);
  } else {
    // No appointments yet — start from today
    baseDate = new Date(TODAY+"T12:00:00");
  }

  // Advance to the preferred day of week
  const targetDow = parseInt(preferredDay);
  let candidate = new Date(baseDate);
  // Find next occurrence of preferredDay on or after baseDate
  let tries = 0;
  while(candidate.getDay() !== targetDow && tries < 14){
    candidate.setDate(candidate.getDate()+1);
    tries++;
  }
  // If that date is in the past, add one interval
  const candidateStr = candidate.toISOString().split("T")[0];
  if(candidateStr < today){
    candidate.setDate(candidate.getDate()+intervalDays);
    // Re-align to preferred day
    tries=0;
    while(candidate.getDay()!==targetDow && tries<14){
      candidate.setDate(candidate.getDate()+1);tries++;
    }
  }

  return {date: candidate.toISOString().split("T")[0], time: preferredTime};
}

  const suggestion = useMemo(()=>computeNextSuggested(patient, appointments),[patient, appointments]);

  const addNote=()=>{if(!nf.content)return;setData(d=>({...d,notes:[...d.notes,{id:Date.now(),patientId:patient.id,date:nf.date,session:parseInt(nf.session)||pN.length+1,content:nf.content,private:true}]}));setNM(false);setNF({content:"",session:"",date:TODAY});};
  const addPay=()=>{const amt=parseInt(pf.amount);if(!amt)return;setData(d=>({...d,payments:[...d.payments,{id:Date.now(),patientId:patient.id,patientName:patient.name,date:pf.date,amount:amt,method:pf.method,concept:pf.concept||"Pago",status:"paid"}]}));setPM(false);setPF({amount:String(DEFAULT_FEE),method:"efectivo",concept:"",date:TODAY});};

  const saveFrequency=()=>{
    const updated={...patient, frequency:ff.frequency, preferredDay:parseInt(ff.preferredDay), preferredTime:ff.preferredTime};
    setData(d=>({...d,patients:d.patients.map(p=>p.id===patient.id?updated:p)}));
    setFM(false);
  };

  const scheduleNext=()=>{
    if(!suggestion)return;
    // Check if a confirmed appt already exists on that date/time for this patient
    const clash=appointments.find(a=>a.patientId===patient.id&&a.date===suggestion.date&&a.time===suggestion.time&&a.status!=="cancelled");
    if(clash){alert(`Ya existe una cita el ${suggestion.date} a las ${suggestion.time}`);return;}
    const newAppt={id:Date.now(),patientId:patient.id,patientName:patient.name,date:suggestion.date,time:suggestion.time,duration:50,status:"confirmed",fee:DEFAULT_FEE};
    setData(d=>({...d,appointments:[...d.appointments,newAppt]}));
    setSchedulePreview(suggestion);
    setTimeout(()=>setSchedulePreview(null),3500);
  };

  // Generate preview of next N sessions using same logic as autoScheduleSessions
  const previewSessions = useMemo(()=>{
    if(!patient.frequency||patient.frequency==="none"||patient.preferredDay===undefined||!patient.preferredTime) return [];
    const intervalDays=patient.frequency==="weekly"?7:14;
    const targetDow=parseInt(patient.preferredDay);
    const today=getToday();

    const findNextDow=(base,dow)=>{
      const d=new Date(base);let tries=0;
      while(d.getDay()!==dow&&tries<14){d.setDate(d.getDate()+1);tries++;}
      return new Date(d);
    };

    const pConfirmed=appointments.filter(a=>a.patientId===patient.id&&(a.status==="confirmed"||a.status==="done")).sort((a,b)=>b.date.localeCompare(a.date));

    let cursor;
    if(pConfirmed.length>0){
      const next=new Date(pConfirmed[0].date+"T12:00:00");
      next.setDate(next.getDate()+intervalDays);
      cursor=findNextDow(next,targetDow);
    } else {
      cursor=findNextDow(new Date(today+"T12:00:00"),targetDow);
    }

    const result=[];
    let safety=0;
    while(result.length<6&&safety++<60){
      const ds=cursor.toISOString().split("T")[0];
      if(ds>=today){
        const existing=appointments.find(a=>a.patientId===patient.id&&a.date===ds&&a.status!=="cancelled");
        result.push({date:ds,time:patient.preferredTime,exists:!!existing});
      }
      cursor.setDate(cursor.getDate()+intervalDays);
      cursor=findNextDow(cursor,targetDow);
    }
    return result;
  },[patient,appointments]);

  const SC={confirmed:C.accent,done:C.green,pending:C.yellow,cancelled:C.muted};
  const SL={confirmed:"Confirmada",done:"Realizada",pending:"Pendiente",cancelled:"Cancelada"};
  const MC={efectivo:C.green,digital:C.accent,pendiente:C.yellow};
  const ML={efectivo:"Efectivo",digital:"Digital",pendiente:"Pendiente"};
  const tabs=[{id:"resumen",l:"Resumen"},{id:"sesiones",l:`Sesiones(${pA.length})`},{id:"pagos",l:`Pagos(${pP.length})`},{id:"notas",l:`Notas(${pN.length})`}];

  const freqColor = patient.frequency==="weekly"?C.accent:patient.frequency==="biweekly"?C.green:C.muted;

  return (
    <div className="fi">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={onBack} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:18,padding:"6px 12px"}}>←</button>
        <div><div style={{fontWeight:600}}>{patient.name}</div><div style={{fontSize:11,color:C.muted}}>desde {patient.since}</div></div>
      </div>

      {/* Hero card */}
      <Card style={{marginBottom:14,background:`linear-gradient(135deg,${C.card},${C.surface})`}}>
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:10}}>
          <Av name={patient.name} size={48}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:15}}>{patient.name}</div>
            {patient.email&&<div style={{fontSize:12,color:C.muted}}>{patient.email}</div>}
            {patient.phone&&<div style={{fontSize:12,color:C.muted}}>{patient.phone}</div>}
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          {next?<Badge color={C.accent}>📅 {next.date} {next.time}</Badge>:<Badge color={C.muted}>Sin próxima cita</Badge>}
          {pend>0&&<Badge color={C.yellow}>⚠ ${pend.toLocaleString()}</Badge>}
          <Badge color={freqColor}>🔁 {FREQ_LABELS[patient.frequency||"none"]}</Badge>
        </div>
      </Card>

      {/* ── FREQUENCY CARD ─────────────────────────────────────────── */}
      <Card style={{marginBottom:14,borderColor:patient.frequency&&patient.frequency!=="none"?freqColor+"55":C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:patient.frequency&&patient.frequency!=="none"?12:0}}>
          <div>
            <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>🔁 Frecuencia de agenda</div>
            {patient.frequency&&patient.frequency!=="none"?(
              <div style={{fontSize:13,color:C.text}}>
                <span style={{color:freqColor,fontWeight:600}}>{FREQ_LABELS[patient.frequency]}</span>
                {" · "}{DAY_NAMES[patient.preferredDay||1]}s{" · "}{patient.preferredTime}
              </div>
            ):(
              <div style={{fontSize:12,color:C.muted}}>Sin frecuencia configurada</div>
            )}
          </div>
          <button onClick={()=>{setFF({frequency:patient.frequency||"none",preferredDay:String(patient.preferredDay!==undefined?patient.preferredDay:1),preferredTime:patient.preferredTime||"10:00"});setFM(true);}}
            style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,padding:"6px 12px",fontSize:12,flexShrink:0}}>
            ✏ Editar
          </button>
        </div>

        {/* Suggestion + auto-schedule button */}
        {suggestion&&(
          <div style={{background:C.bg,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
            <div>
              <div style={{fontSize:11,color:C.muted,marginBottom:2}}>PRÓXIMA SUGERIDA</div>
              <div style={{fontSize:13,fontWeight:600,color:C.text}}>{suggestion.date} · {suggestion.time}</div>
              <div style={{fontSize:11,color:C.muted}}>{DAY_SHORT[new Date(suggestion.date+"T12:00:00").getDay()]}</div>
            </div>
            <button onClick={scheduleNext}
              style={{background:C.accent,color:"#fff",borderRadius:9,padding:"8px 14px",fontSize:12,fontWeight:600,flexShrink:0,border:"none"}}>
              + Agendar
            </button>
          </div>
        )}

        {/* Toast confirmation */}
        {schedulePreview&&(
          <div style={{marginTop:8,background:C.green+"18",border:`1px solid ${C.green}44`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.green}}>
            ✓ Cita agendada: {schedulePreview.date} {schedulePreview.time}
          </div>
        )}

        {/* Upcoming sessions preview */}
        {previewSessions.length>0&&(
          <div style={{marginTop:12}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Próximas sesiones proyectadas</div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {previewSessions.map((s,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:s.exists?C.green+"0f":C.bg,borderRadius:8,border:`1px solid ${s.exists?C.green+"33":C.border}`}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:10,color:C.muted,minWidth:24}}>{DAY_SHORT[new Date(s.date+"T12:00:00").getDay()]}</span>
                    <span style={{fontSize:13,color:C.text}}>{s.date}</span>
                    <span style={{fontSize:12,color:C.muted}}>{s.time}</span>
                  </div>
                  {s.exists
                    ?<span style={{fontSize:10,color:C.green}}>✓ Agendada</span>
                    :<button onClick={()=>{
                        const clash=appointments.find(a=>a.patientId===patient.id&&a.date===s.date&&a.time===s.time&&a.status!=="cancelled");
                        if(clash)return;
                        setData(d=>({...d,appointments:[...d.appointments,{id:Date.now(),patientId:patient.id,patientName:patient.name,date:s.date,time:s.time,duration:50,status:"confirmed",fee:DEFAULT_FEE}]}));
                      }}
                      style={{background:"transparent",border:`1px solid ${C.accent}66`,borderRadius:6,color:C.accent,fontSize:11,padding:"3px 10px"}}>
                      + Agendar
                    </button>
                  }
                </div>
              ))}
            </div>
          </div>
        )}
      </Card>

      {/* ── PAYMENT SCHEME CARD ──────────────────────────────────────── */}
      {(()=>{
        const SCHEMES = ["per_session","weekly","monthly_advance","monthly_arrears"];
        const SCHEME_INFO = {
          per_session:     {label:"Por sesión",     sub:"Se cobra al terminar cada sesión",  color:C.muted},
          weekly:          {label:"Semanal",         sub:"Pago una vez por semana",            color:C.accent},
          monthly_advance: {label:"Mensual adelantado", sub:"Pago al inicio de cada mes",     color:C.green},
          monthly_arrears: {label:"Mensual vencido", sub:"Pago al cierre de cada mes",        color:C.yellow},
        };
        // Read from live data.patients to always reflect latest saved value
        const livePatient = data.patients.find(p=>p.id===patient.id)||patient;
        const scheme = livePatient.paymentScheme || "per_session";
        const info = SCHEME_INFO[scheme];

        const cycleScheme = () => {
          const idx = SCHEMES.indexOf(scheme);
          const next = SCHEMES[(idx+1) % SCHEMES.length];
          setData(d=>({...d, patients:d.patients.map(p=>p.id===patient.id?{...p,paymentScheme:next}:p)}));
        };

        return (
          <Card style={{marginBottom:14,borderColor:scheme!=="per_session"?info.color+"55":C.border}}>
            <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>💳 Esquema de cobro</div>
            {/* Option buttons */}
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {SCHEMES.map(s=>{
                const si=SCHEME_INFO[s];
                const isSel=s===scheme;
                return (
                  <button key={s} onClick={()=>setData(d=>({...d,patients:d.patients.map(p=>p.id===patient.id?{...p,paymentScheme:s}:p)}))}
                    style={{display:"flex",alignItems:"center",gap:10,background:isSel?si.color+"18":C.bg,border:`1.5px solid ${isSel?si.color:C.border}`,borderRadius:10,padding:"10px 14px",textAlign:"left",transition:"all .15s",cursor:"pointer"}}>
                    <div style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${isSel?si.color:C.border}`,background:isSel?si.color:"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {isSel&&<div style={{width:6,height:6,borderRadius:"50%",background:"#fff"}}/>}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:isSel?si.color:C.text}}>{si.label}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:1}}>{si.sub}</div>
                    </div>
                  </button>
                );
              })}
            </div>
            {/* Monthly tracker */}
            {(scheme==="monthly_advance"||scheme==="monthly_arrears")&&(()=>{
              const thisMonth=TODAY.slice(0,7);
              const monthPays=pP.filter(p=>p.date.startsWith(thisMonth)&&p.status==="paid");
              const monthSess=pA.filter(a=>a.date.startsWith(thisMonth)&&a.status==="done").length;
              const monthTotal=monthPays.reduce((s,p)=>s+p.amount,0);
              const expected=monthSess*DEFAULT_FEE;
              const balance=monthTotal-expected;
              return (
                <div style={{marginTop:12,background:C.bg,borderRadius:10,padding:"10px 14px"}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:.4}}>Resumen del mes</div>
                  <div style={{display:"flex",gap:16}}>
                    <div><div style={{fontSize:11,color:C.muted}}>Sesiones</div><div style={{fontSize:16,fontWeight:600,color:C.text}}>{monthSess}</div></div>
                    <div><div style={{fontSize:11,color:C.muted}}>Cobrado</div><div style={{fontSize:16,fontWeight:600,color:C.green}}>${monthTotal.toLocaleString()}</div></div>
                    <div><div style={{fontSize:11,color:C.muted}}>Balance</div><div style={{fontSize:16,fontWeight:600,color:balance>=0?C.green:C.red}}>{balance>=0?"+":""}{balance.toLocaleString()}</div></div>
                  </div>
                </div>
              );
            })()}
          </Card>
        );
      })()}

      {/* Tabs */}
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
        {tabs.map(t=><button key={t.id} className="pill" onClick={()=>setT(t.id)} style={{background:tab===t.id?C.accent:"transparent",color:tab===t.id?"#fff":C.muted,borderColor:tab===t.id?C.accent:C.border}}>{t.l}</button>)}
      </div>

      {tab==="resumen"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",gap:10}}><Stat label="Sesiones" value={pA.filter(a=>a.status==="done").length} sub={`${pA.length} total`} color={C.al}/><Stat label="Cobrado" value={`$${paid.toLocaleString()}`} color={C.green}/></div>
          <div style={{display:"flex",gap:10}}><Stat label="Pendiente" value={`$${pend.toLocaleString()}`} color={pend>0?C.yellow:C.muted}/><Stat label="Notas" value={pN.length} sub="clínicas"/></div>
          {pN[0]&&<Card><div style={{fontSize:11,color:C.muted,marginBottom:6,display:"flex",justifyContent:"space-between"}}><span>ÚLTIMA NOTA</span><span>{pN[0].date}</span></div><p style={{fontSize:13,lineHeight:1.6,display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{pN[0].content}</p><button onClick={()=>setT("notas")} style={{background:"none",color:C.accent,fontSize:12,marginTop:8,padding:0}}>Ver todas →</button></Card>}
        </div>
      )}
      {tab==="sesiones"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {pA.length===0?<Card style={{textAlign:"center",padding:36,color:C.muted}}>Sin sesiones</Card>
          :pA.map(a=>(
            <Card key={a.id} style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
              <div style={{minWidth:48,textAlign:"center"}}><div style={{fontSize:13,fontWeight:600,color:C.al}}>{a.time}</div><div style={{fontSize:10,color:C.muted}}>50 min</div></div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{a.date}</div><div style={{fontSize:11,color:C.muted}}>${a.fee.toLocaleString()} pesos</div></div>
              <Badge color={SC[a.status]}>{SL[a.status]}</Badge>
            </Card>
          ))}
        </div>
      )}
      {tab==="pagos"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <div style={{display:"flex",gap:10,marginBottom:4}}><Stat label="Cobrado" value={`$${paid.toLocaleString()}`} color={C.green}/><Stat label="Pendiente" value={`$${pend.toLocaleString()}`} color={pend>0?C.yellow:C.muted}/></div>
          <Btn small onClick={()=>setPM(true)}>+ Registrar cobro</Btn>
          {pP.length===0?<Card style={{textAlign:"center",padding:36,color:C.muted}}>Sin pagos</Card>
          :pP.map(p=>(
            <Card key={p.id} style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500}}>{p.concept}</div><div style={{fontSize:11,color:C.muted}}>{p.date}</div></div>
              <Badge color={MC[p.method]}>{ML[p.method]}</Badge>
              <div style={{fontSize:14,fontWeight:600,color:p.status==="paid"?C.green:C.yellow}}>${p.amount.toLocaleString()}</div>
            </Card>
          ))}
        </div>
      )}
      {tab==="notas"&&(
        <div>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}><Btn small onClick={()=>setNM(true)}>+ Nueva nota</Btn></div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {pN.length===0?<Card style={{textAlign:"center",padding:36,color:C.muted}}>Sin notas</Card>
            :pN.map(n=>(
              <Card key={n.id}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{display:"flex",gap:8}}><Badge color={C.accent}>#{n.session}</Badge><span style={{fontSize:11,color:C.muted,alignSelf:"center"}}>{n.date}</span></div><Badge color={C.muted}>🔒</Badge></div>
                <p style={{fontSize:13,lineHeight:1.7}}>{n.content}</p>
              </Card>
            ))}
          </div>
        </div>
      )}

      {/* ── FREQUENCY MODAL ─────────────────────────────────────────── */}
      {freqModal&&(
        <Sheet onClose={()=>setFM(false)} title={`Frecuencia — ${patient.name}`}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>

            {/* Frequency selector */}
            <div>
              <div style={{fontSize:11,color:C.muted,fontWeight:500,letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>Frecuencia</div>
              <div style={{display:"flex",gap:8}}>
                {["none","weekly","biweekly"].map(f=>(
                  <button key={f} onClick={()=>setFF(d=>({...d,frequency:f}))}
                    style={{flex:1,padding:"10px 6px",borderRadius:10,border:`2px solid ${ff.frequency===f?(f==="weekly"?C.accent:f==="biweekly"?C.green:C.muted):C.border}`,background:ff.frequency===f?(f==="weekly"?C.accent+"22":f==="biweekly"?C.green+"22":C.surface):C.surface,color:ff.frequency===f?(f==="weekly"?C.accent:f==="biweekly"?C.green:C.muted):C.muted,fontSize:12,fontWeight:600,transition:"all .15s",textAlign:"center"}}>
                    {f==="none"?"Sin frecuencia":f==="weekly"?"Semanal":"Quincenal"}
                    {f==="weekly"&&<div style={{fontSize:10,fontWeight:400,marginTop:2}}>cada 7 días</div>}
                    {f==="biweekly"&&<div style={{fontSize:10,fontWeight:400,marginTop:2}}>cada 14 días</div>}
                  </button>
                ))}
              </div>
            </div>

            {ff.frequency!=="none"&&(
              <>
                {/* Day selector */}
                <div>
                  <div style={{fontSize:11,color:C.muted,fontWeight:500,letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>Día preferido</div>
                  <div style={{display:"flex",gap:5}}>
                    {[1,2,3,4,5,6,0].map(d=>(
                      <button key={d} onClick={()=>setFF(f=>({...f,preferredDay:String(d)}))}
                        style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${ff.preferredDay===String(d)?C.accent:C.border}`,background:ff.preferredDay===String(d)?C.accent:C.surface,color:ff.preferredDay===String(d)?"#fff":C.muted,fontSize:11,fontWeight:500}}>
                        {DAY_SHORT[d]}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Time selector */}
                <div>
                  <div style={{fontSize:11,color:C.muted,fontWeight:500,letterSpacing:.5,textTransform:"uppercase",marginBottom:8}}>Hora preferida</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {WORK_HOURS.map(h=>(
                      <button key={h} onClick={()=>setFF(f=>({...f,preferredTime:h}))}
                        style={{padding:"7px 12px",borderRadius:8,border:`1px solid ${ff.preferredTime===h?C.accent:C.border}`,background:ff.preferredTime===h?C.accent:C.surface,color:ff.preferredTime===h?"#fff":C.muted,fontSize:12,fontWeight:500}}>
                        {h}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Preview of next suggested */}
                {(()=>{
                  const previewPatient={...patient,frequency:ff.frequency,preferredDay:parseInt(ff.preferredDay),preferredTime:ff.preferredTime};
                  const s=computeNextSuggested(previewPatient,appointments);
                  if(!s)return null;
                  return (
                    <div style={{background:C.bg,borderRadius:10,padding:"10px 14px",border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:11,color:C.muted,marginBottom:4}}>PRÓXIMA SESIÓN SUGERIDA</div>
                      <div style={{fontSize:14,fontWeight:600,color:C.text}}>{s.date} · {s.time}</div>
                      <div style={{fontSize:11,color:C.muted}}>{DAY_NAMES[new Date(s.date+"T12:00:00").getDay()]}</div>
                    </div>
                  );
                })()}
              </>
            )}

            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:4}}>
              <Btn variant="ghost" onClick={()=>setFM(false)}>Cancelar</Btn>
              <Btn onClick={saveFrequency}>Guardar</Btn>
            </div>
          </div>
        </Sheet>
      )}

      {/* ── NOTE MODAL ───────────────────────────────────────────────── */}
      {noteModal&&(
        <Sheet onClose={()=>setNM(false)} title={`Nota — ${patient.name}`}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{display:"flex",gap:10}}><div style={{flex:1}}><Fld label="Fecha" type="date" value={nf.date} onChange={v=>setNF(f=>({...f,date:v}))}/></div><div style={{width:90}}><Fld label="# Sesión" type="number" value={nf.session} onChange={v=>setNF(f=>({...f,session:v}))} placeholder="Auto"/></div></div>
            <Fld label="Notas" value={nf.content} onChange={v=>setNF(f=>({...f,content:v}))} rows={5} placeholder="Observaciones, avances..."/>
            <div style={{background:C.bg,borderRadius:8,padding:"8px 12px",fontSize:11,color:C.muted}}>🔒 Solo visible para ti</div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setNM(false)}>Cancelar</Btn><Btn onClick={addNote} disabled={!nf.content}>Guardar</Btn></div>
          </div>
        </Sheet>
      )}

      {/* ── PAY MODAL ────────────────────────────────────────────────── */}
      {payModal&&(

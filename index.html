// ── AUTO-SCHEDULE HELPER ──────────────────────────────────────────────────────
function autoScheduleSessions(patient, appointments, weeksAhead=8){
  const {frequency,preferredDay,preferredTime}=patient;
  if(!frequency||frequency==="none"||preferredDay===undefined||!preferredTime) return [];
  const intervalDays=frequency==="weekly"?7:14;
  const today=getToday();
  const horizon=addDays(today,weeksAhead*7);
  const targetDow=parseInt(preferredDay);

  // Collect all existing (non-cancelled) dates+times for this patient
  const existing=new Set(appointments
    .filter(a=>a.patientId===patient.id&&a.status!=="cancelled")
    .map(a=>a.date+"T"+a.time));

  // Find the anchor: last confirmed/done appointment, or today
  const pAppts=appointments
    .filter(a=>a.patientId===patient.id&&(a.status==="confirmed"||a.status==="done"))
    .sort((a,b)=>b.date.localeCompare(a.date));

  // Build a set of all dates that should have sessions, starting from first anchor
  // Strategy: find the first occurrence of preferredDay on or after max(today, lastAppt)
  // then generate every intervalDays forward until horizon
  const anchorBase = pAppts.length>0
    ? new Date(pAppts[0].date+"T12:00:00")
    : new Date(today+"T12:00:00");

  // Find next occurrence of targetDow on or after anchorBase
  const findNextDow=(base, dow)=>{
    const d=new Date(base);
    let tries=0;
    while(d.getDay()!==dow && tries<14){d.setDate(d.getDate()+1);tries++;}
    return new Date(d);
  };

  // If last appt exists, advance one interval from it to get the next expected date
  let cursor;
  if(pAppts.length>0){
    // Start from one interval after the last appointment
    const next=new Date(anchorBase);
    next.setDate(next.getDate()+intervalDays);
    cursor=findNextDow(next, targetDow);
  } else {
    // No appointments yet — start from today, find first preferred day
    cursor=findNextDow(new Date(today+"T12:00:00"), targetDow);
    // If that date is today itself and today >= today, use it
  }

  const toCreate=[];
  let safety=0;
  while(safety++<60){
    const ds=cursor.toISOString().split("T")[0];
    if(ds>horizon) break;
    if(ds>=today){
      const key=ds+"T"+preferredTime;
      if(!existing.has(key)){
        toCreate.push({date:ds, time:preferredTime});
        existing.add(key);
      }
    }
    // Advance by interval, then re-align to preferred day
    cursor.setDate(cursor.getDate()+intervalDays);
    cursor=findNextDow(cursor, targetDow);
  }
  return toCreate;
}

// ── AGENDA ────────────────────────────────────────────────────────────────────
function Agenda({data,setData,slotDays,setSlotDays}){
  const {appointments,patients}=data;
  const daySchedule=data.daySchedule||DEFAULT_DAY_SCHEDULE;

  const [viewMode,setViewMode]=useState("week");
  const [modal,setModal]=useState(false);
  const [newPatientModal,setNewPatientModal]=useState(false);
  const [scheduleModal,setScheduleModal]=useState(false);
  const [pendingSlot,setPendingSlot]=useState(null);
  const [form,setForm]=useState({patientId:"",date:getToday(),time:"09:00",fee:String(DEFAULT_FEE),status:"confirmed"});
  const [newPatForm,setNPF]=useState({name:"",phone:"",email:"",since:getToday(),bookSlot:true});

  // ── KEY FIX: weekStart initialised from live TODAY, not frozen constant ──
  const getWeekStart=useCallback(d=>{
    const base=new Date(d+"T12:00:00"),dow=base.getDay(),diff=dow===0?-6:1-dow;
    base.setDate(base.getDate()+diff);
    return base.toISOString().split("T")[0];
  },[]);
  const [weekStart,setWeekStart]=useState(()=>getWeekStart(getToday()));
  const [selDate,setSelDate]=useState(()=>getToday());

  // Re-sync on mount to avoid stale initial state in PWA
  useEffect(()=>{
    const t=getToday();
    setWeekStart(getWeekStart(t));
    setSelDate(t);
  },[]);

  const numDays=viewMode==="day"?1:viewMode==="week"?5:10;
  const viewDays=useMemo(()=>{
    if(viewMode==="day") return [selDate];
    return Array.from({length:numDays},(_,i)=>addDays(weekStart,i));
  },[viewMode,selDate,weekStart,numDays]);

  const prevPeriod=()=>{
    if(viewMode==="day") setSelDate(d=>addDays(d,-1));
    else setWeekStart(d=>addDays(d,viewMode==="week"?-7:-14));
  };
  const nextPeriod=()=>{
    if(viewMode==="day") setSelDate(d=>addDays(d,1));
    else setWeekStart(d=>addDays(d,viewMode==="week"?7:14));
  };
  const goToday=()=>{const t=getToday();setWeekStart(getWeekStart(t));setSelDate(t);};

  const periodLabel=useMemo(()=>{
    if(viewMode==="day"){
      const d=new Date(selDate+"T12:00:00");
      const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
      return `${WDAYS_FULL[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
    }
    const s=new Date(viewDays[0]+"T12:00:00"),e=new Date(viewDays[viewDays.length-1]+"T12:00:00");
    const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    if(s.getMonth()===e.getMonth()) return `${months[s.getMonth()]} ${s.getFullYear()}`;
    return `${months[s.getMonth()]}–${months[e.getMonth()]} ${e.getFullYear()}`;
  },[viewMode,selDate,viewDays]);

  const todayVisible=viewDays.includes(getToday());

  // Is a given date+slot blocked by schedule?
  const isBlocked=useCallback((dateStr,slot)=>{
    const dow=new Date(dateStr+"T12:00:00").getDay();
    const blocks=(daySchedule[dow]||[]);
    if(!blocks.length) return false;
    const [sh,sm]=slot.split(":").map(Number);
    const slotMin=sh*60+sm;
    return blocks.some(b=>{
      const [fh,fm]=b.from.split(":").map(Number);
      const [th,tm]=b.to.split(":").map(Number);
      return slotMin>=fh*60+fm && slotMin<th*60+tm;
    });
  },[daySchedule]);

  // Auto-schedule: generate and commit future sessions for patients with frequency
  const autoScheduleAll=useCallback(()=>{
    setData(d=>{
      let newAppts=[...d.appointments];
      d.patients.forEach(p=>{
        const toCreate=autoScheduleSessions(p,newAppts);
        toCreate.forEach(({date,time})=>{
          newAppts.push({id:Date.now()+Math.random(),patientId:p.id,patientName:p.name,date,time,duration:50,status:"confirmed",fee:DEFAULT_FEE});
        });
      });
      return {...d,appointments:newAppts};
    });
  },[setData]);

  const addAppt=()=>{
    const p=patients.find(p=>p.id===parseInt(form.patientId));if(!p)return;
    setData(d=>({...d,appointments:[...d.appointments,{id:Date.now(),patientId:p.id,patientName:p.name,date:form.date,time:form.time,duration:50,status:form.status,fee:parseInt(form.fee)||DEFAULT_FEE}]}));
    setModal(false);
    if(viewMode!=="day") setWeekStart(getWeekStart(form.date));
    else setSelDate(form.date);
  };

  const addNewPatientAndBook=()=>{
    if(!newPatForm.name.trim())return;
    const newP={id:Date.now(),name:newPatForm.name.trim(),phone:newPatForm.phone.trim(),email:newPatForm.email.trim(),since:newPatForm.since||getToday()};
    setData(d=>{
      const updated={...d,patients:[...d.patients,newP]};
      if(newPatForm.bookSlot&&pendingSlot){
        updated.appointments=[...d.appointments,{id:Date.now()+1,patientId:newP.id,patientName:newP.name,date:pendingSlot.date,time:pendingSlot.time,duration:50,status:"confirmed",fee:DEFAULT_FEE}];
      }
      return updated;
    });
    setNewPatientModal(false);setPendingSlot(null);
    setNPF({name:"",phone:"",email:"",since:getToday(),bookSlot:true});
  };

  const bookSlot=(date,time)=>{
    if(isBlocked(date,time)) return; // don't allow booking blocked slots
    setPendingSlot({date,time});
    setForm(f=>({...f,date,time,patientId:""}));
    setModal(true);
  };

  const toggle=id=>setData(d=>({...d,appointments:d.appointments.map(a=>a.id===id?{...a,status:a.status==="confirmed"?"done":a.status==="done"?"cancelled":"confirmed"}:a)}));

  const SC={confirmed:C.accent,done:C.green,pending:C.yellow,cancelled:C.muted};
  const SL={confirmed:"Confirmada",done:"Realizada",pending:"Pendiente",cancelled:"Cancelada"};
  const SC_BG={confirmed:C.accent+"28",done:C.green+"28",pending:C.yellow+"28",cancelled:C.muted+"18"};

  // Returns appointments that START at this slot
  const apptAt=(date,slot)=>appointments.filter(a=>a.date===date&&a.time===slot&&a.status!=="cancelled");

  // Returns true if any appointment's 50-min window covers this slot (for coloring non-start cells)
  const slotCoveredBy=(date,slot)=>{
    const [sh,sm]=slot.split(":").map(Number);
    const slotMin=sh*60+sm;
    return appointments.filter(a=>{
      if(a.date!==date||a.status==="cancelled")return false;
      const [ah,am]=a.time.split(":").map(Number);
      const startMin=ah*60+am;
      return slotMin>startMin && slotMin<startMin+50;
    });
  };

  const COL_W=viewMode==="day"?200:viewMode==="week"?50:38;
  // Row height for half-hour slots
  const ROW_H=viewMode==="day"?44:36;

  // Count auto-schedulable patients
  const autoCount=patients.filter(p=>p.frequency&&p.frequency!=="none").length;

  return (
    <div className="fi">
      {/* ── Header ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div>
          <h2 style={{fontFamily:"Fraunces",fontSize:22,fontWeight:400}}>Agenda</h2>
          <div style={{fontSize:12,color:C.muted,marginTop:1}}>{periodLabel}</div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
          {!todayVisible&&<button onClick={goToday} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:10,padding:"5px 8px"}}>Hoy</button>}
          <button onClick={prevPeriod} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:14,padding:"5px 9px"}}>‹</button>
          <button onClick={nextPeriod} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:14,padding:"5px 9px"}}>›</button>
          <Btn small onClick={()=>{setForm(f=>({...f,date:viewMode==="day"?selDate:getToday()}));setModal(true);}}>+ Cita</Btn>
        </div>
      </div>

      {/* ── View mode + tools row ── */}
      <div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        {[{id:"day",l:"Día"},{id:"week",l:"Semana"},{id:"biweek",l:"2 sem"}].map(v=>(
          <button key={v.id} onClick={()=>setViewMode(v.id)}
            style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${viewMode===v.id?C.accent:C.border}`,background:viewMode===v.id?C.accent:"transparent",color:viewMode===v.id?"#fff":C.muted,fontSize:12,fontWeight:500,transition:"all .15s"}}>
            {v.l}
          </button>
        ))}
        {viewMode==="day"&&(
          <input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}
            style={{background:C.surface,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 8px",fontSize:11,flex:1,minWidth:0}}/>
        )}
        <div style={{display:"flex",gap:5,marginLeft:"auto"}}>
          <button onClick={()=>setScheduleModal(true)}
            style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,color:C.muted,fontSize:11,padding:"5px 9px"}}
            title="Configurar horario disponible">🕐</button>
          {autoCount>0&&(
            <button onClick={autoScheduleAll}
              style={{background:C.green+"22",border:`1px solid ${C.green}44`,borderRadius:8,color:C.green,fontSize:11,padding:"5px 9px",fontWeight:600}}
              title={`Auto-agendar ${autoCount} paciente(s) con frecuencia`}>
              🔁 Auto
            </button>
          )}
        </div>
      </div>

      {/* ── Legend ── */}
      <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.muted}}>
          <div style={{width:10,height:10,borderRadius:3,background:C.accent+"28",border:`1px solid ${C.accent}55`}}/>Confirmada
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.muted}}>
          <div style={{width:10,height:10,borderRadius:3,background:C.green+"28",border:`1px solid ${C.green}55`}}/>Realizada
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.muted}}>
          <div style={{width:10,height:10,borderRadius:3,background:"#2a1a1a",border:`1px solid ${C.red}44`}}/>Bloqueada
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.muted}}>
          <div style={{width:10,height:10,borderRadius:3,background:C.green+"12",border:`1px solid ${C.green}22`}}/>Libre
        </div>
      </div>

      {/* ── Free slots ── */}
      <FreeSlots appointments={appointments} onBook={bookSlot} days={slotDays} setDays={setSlotDays} daySchedule={daySchedule}/>

      {/* ── Grid ── */}
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",marginLeft:-14,marginRight:-14,paddingLeft:14,paddingRight:4}}>
        <div style={{minWidth:viewMode==="day"?260:300}}>
          {/* Day headers */}
          {viewMode!=="day"&&(
            <div style={{display:"flex",marginBottom:2,paddingLeft:34}}>
              {viewDays.map(d=>{
                const dow=new Date(d+"T12:00:00").getDay();
                const dayNum=new Date(d+"T12:00:00").getDate();
                const isToday=d===getToday();
                const hasCita=appointments.some(a=>a.date===d&&a.status!=="cancelled");
                return (
                  <div key={d} style={{width:COL_W,flexShrink:0,textAlign:"center",padding:"4px 1px"}}>
                    <div style={{fontSize:9,color:C.muted,fontWeight:500,marginBottom:2}}>{WDAYS[dow]}</div>
                    <div style={{width:22,height:22,borderRadius:"50%",background:isToday?C.accent:"transparent",color:isToday?"#fff":C.text,fontSize:11,fontWeight:isToday?700:500,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto"}}>{dayNum}</div>
                    {hasCita&&<div style={{width:3,height:3,borderRadius:"50%",background:isToday?C.al:C.accent,margin:"2px auto 0"}}/>}
                  </div>
                );
              })}
            </div>
          )}

          {/* Half-hour rows */}
          {WORK_SLOTS.map((slot,si)=>{
            const isHour=slot.endsWith(":00");
            const [hh,mm]=slot.split(":").map(Number);
            const isNowHour=(()=>{const n=new Date();return n.toISOString().split("T")[0]===getToday()&&n.getHours()===hh&&(mm===0?n.getMinutes()<30:n.getMinutes()>=30);})();

            return (
              <div key={slot} style={{display:"flex",height:ROW_H,borderTop:isHour?`1px solid ${C.border}44`:`1px solid ${C.border}11`}}>
                {/* Time label — only show on the hour */}
                <div style={{width:34,flexShrink:0,paddingTop:2,fontSize:isHour?10:8,color:isNowHour?C.accent:isHour?C.muted:C.border,fontWeight:isNowHour?600:400,textAlign:"right",paddingRight:5,lineHeight:1}}>
                  {isHour?slot:"·"}
                </div>
                {/* Day columns */}
                {viewDays.map(d=>{
                  const appts=apptAt(d,slot);
                  const covered=slotCoveredBy(d,slot); // appointments whose window covers this slot
                  const blocked=isBlocked(d,slot);
                  const dow=new Date(d+"T12:00:00").getDay();
                  const isWeekend=dow===0||dow===6;
                  const isPast=(()=>{const n=new Date();const dDate=new Date(d+"T"+slot+":00");return dDate<n;})();

                  // Cell background
                  let cellBg="transparent";
                  const isOccupied=appts.length>0||covered.length>0;
                  if(blocked) cellBg="#2a1212";
                  else if(isWeekend) cellBg=C.surface+"88";
                  else if(!isOccupied && !isPast) cellBg=C.green+"0a"; // free = subtle green
                  // occupied cells get bg from the appointment color

                  return (
                    <div key={d} style={{width:COL_W,flexShrink:0,padding:"1px 2px",borderLeft:`1px solid ${C.border}22`,height:ROW_H,position:"relative",background:cellBg,transition:"background .1s"}}>
                      {blocked?(
                        <div style={{position:"absolute",inset:0,backgroundImage:`repeating-linear-gradient(45deg,transparent,transparent 3px,${C.red}15 3px,${C.red}15 6px)`,borderRadius:3,pointerEvents:"none"}}/>
                      ):appts.length>0?(
                        // Start of appointment
                        appts.map(a=>(
                          <div key={a.id} onClick={()=>toggle(a.id)}
                            style={{background:SC_BG[a.status],border:`1.5px solid ${SC[a.status]}88`,borderRadius:4,padding:viewMode==="day"?"3px 6px":"1px 3px",cursor:"pointer",height:"100%",overflow:"hidden",boxSizing:"border-box"}}>
                            {viewMode==="day"?(
                              <>
                                <div style={{fontSize:10,color:SC[a.status],fontWeight:700,lineHeight:1.2}}>{a.time} · {SL[a.status]}</div>
                                <div style={{fontSize:12,color:C.text,fontWeight:600,marginTop:1,lineHeight:1.2}}>{a.patientName}</div>
                              </>
                            ):(
                              <div style={{fontSize:8,color:SC[a.status],fontWeight:700,lineHeight:1.1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.patientName.split(" ")[0]}</div>
                            )}
                          </div>
                        ))
                      ):covered.length>0?(
                        // Continuation of a running appointment — show as occupied, no-tap
                        <div style={{position:"absolute",inset:0,background:SC_BG[covered[0].status],borderLeft:`2px solid ${SC[covered[0].status]}66`,opacity:.6,pointerEvents:"none",borderRadius:2}}/>
                      ):(
                        // Free slot
                        <button onClick={()=>bookSlot(d,slot)}
                          style={{position:"absolute",inset:0,background:"transparent",border:"none",cursor:isPast||isWeekend?"default":"pointer",borderRadius:3}}
                          disabled={isPast||isWeekend}/>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>

      <div style={{fontSize:10,color:C.muted,textAlign:"center",marginTop:8,marginBottom:4}}>
        Toca celda verde para agendar · Toca cita para cambiar estado · 🔁 Auto-agenda por frecuencia
      </div>

      {/* ── Book appointment modal ── */}
      {modal&&(
        <Sheet onClose={()=>setModal(false)} title={pendingSlot?`Nueva cita · ${pendingSlot.date} ${pendingSlot.time}`:"Nueva Cita"}>
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {patients.length===0?(
              <div>
                <div style={{textAlign:"center",padding:"12px 0",color:C.muted,fontSize:13,marginBottom:12}}>No hay pacientes registrados aún.</div>
                <Btn full onClick={()=>{setModal(false);setNewPatientModal(true);}}>+ Agregar nuevo paciente</Btn>
              </div>
            ):(
              <>
                <Fld label="Paciente" value={form.patientId} onChange={v=>setForm(f=>({...f,patientId:v}))} options={[{v:"",l:"Seleccionar..."}, ...patients.map(p=>({v:p.id,l:p.name}))]}/>
                <button onClick={()=>{setModal(false);setNewPatientModal(true);}}
                  style={{background:"none",border:`1px dashed ${C.border}`,borderRadius:8,color:C.muted,fontSize:12,padding:"8px 0",textAlign:"center",cursor:"pointer"}}>
                  + Agregar nuevo paciente aquí
                </button>
                <div style={{display:"flex",gap:10}}>
                  <div style={{flex:1}}><Fld label="Fecha" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/></div>
                  <div style={{width:110}}><Fld label="Hora" type="time" value={form.time} onChange={v=>setForm(f=>({...f,time:v}))}/></div>
                </div>
                <Fld label="Honorario (pesos)" type="number" value={form.fee} onChange={v=>setForm(f=>({...f,fee:v}))} placeholder={String(DEFAULT_FEE)}/>
                <Fld label="Estado" value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={[{v:"confirmed",l:"Confirmada"},{v:"pending",l:"Pendiente"}]}/>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn>
                  <Btn onClick={addAppt} disabled={!form.patientId}>Guardar</Btn>
                </div>
              </>
            )}
          </div>
        </Sheet>
      )}

      {/* ── Add new patient modal ── */}
      {newPatientModal&&(
        <Sheet onClose={()=>{setNewPatientModal(false);setPendingSlot(null);}} title="Nuevo Paciente">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {pendingSlot&&(
              <div style={{background:C.accent+"18",border:`1px solid ${C.accent}44`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.al}}>
                📅 Se agendará: {pendingSlot.date} · {pendingSlot.time}
              </div>
            )}
            {typeof navigator!=="undefined"&&navigator.contacts&&(
              <button onClick={async()=>{
                  try{
                    const c=await navigator.contacts.select(["name","tel","email"],{multiple:false});
                    if(c&&c.length>0){
                      const ct=c[0];
                      setNPF(f=>({...f,name:(ct.name&&ct.name[0])||f.name,phone:(ct.tel&&ct.tel[0])||f.phone,email:(ct.email&&ct.email[0])||f.email}));
                    }
                  }catch(e){}
                }}
                style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:C.green+"18",border:`1px solid ${C.green}44`,borderRadius:10,padding:"10px 0",color:C.green,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                📒 Importar desde Contactos
              </button>
            )}
            <Fld label="Nombre completo *" value={newPatForm.name} onChange={v=>setNPF(f=>({...f,name:v}))} placeholder="Nombre Apellido"/>
            <Fld label="Teléfono" value={newPatForm.phone} onChange={v=>setNPF(f=>({...f,phone:v}))} placeholder="+52 55 0000 0000" type="tel"/>
            <Fld label="Correo electrónico" value={newPatForm.email} onChange={v=>setNPF(f=>({...f,email:v}))} placeholder="correo@ejemplo.com" type="email"/>
            <Fld label="Fecha de inicio" value={newPatForm.since} onChange={v=>setNPF(f=>({...f,since:v}))} type="date"/>
            {pendingSlot&&(
              <div style={{display:"flex",alignItems:"center",gap:10,background:C.surface,borderRadius:8,padding:"10px 14px",cursor:"pointer"}} onClick={()=>setNPF(f=>({...f,bookSlot:!f.bookSlot}))}>
                <div style={{width:20,height:20,borderRadius:5,background:newPatForm.bookSlot?C.accent:C.surface,border:`2px solid ${newPatForm.bookSlot?C.accent:C.border}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {newPatForm.bookSlot&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
                </div>
                <div style={{fontSize:12,color:C.text}}>Agendar cita el {pendingSlot.date} a las {pendingSlot.time}</div>
              </div>
            )}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn variant="ghost" onClick={()=>{setNewPatientModal(false);setPendingSlot(null);}}>Cancelar</Btn>
              <Btn onClick={addNewPatientAndBook} disabled={!newPatForm.name.trim()}>
                {pendingSlot&&newPatForm.bookSlot?"Agregar y agendar":"Agregar paciente"}
              </Btn>
            </div>
          </div>
        </Sheet>
      )}

      {/* ── Schedule editor ── */}
      {scheduleModal&&(
        <ScheduleEditor
          daySchedule={daySchedule}
          setDaySchedule={ds=>setData(d=>({...d,daySchedule:ds}))}
          onClose={()=>setScheduleModal(false)}
        />
      )}
    </div>
  );
}

// ── PAGOS ─────────────────────────────────────────────────────────────────────
function Pagos({data,setData}){
  const {payments,patients,appointments}=data;
  const today=getToday();
  const [modal,setModal]=useState(false);
  const [tab,setTab]=useState("resumen"); // "resumen" | "detalle" | "pendientes"
  const [month,setMonth]=useState(()=>today.slice(0,7));
  const [form,setForm]=useState({patientId:"",amount:String(DEFAULT_FEE),method:"efectivo",concept:"",date:today});

  // Previous month for comparison
  const prevMonth=useMemo(()=>{
    const [y,m]=month.split("-").map(Number);
    const pm=m===1?12:m-1;
    const py=m===1?y-1:y;
    return `${py}-${String(pm).padStart(2,"0")}`;
  },[month]);

  const fil=payments.filter(p=>p.date.startsWith(month));
  const filPrev=payments.filter(p=>p.date.startsWith(prevMonth));
  const paid=fil.filter(p=>p.status==="paid").reduce((s,p)=>s+p.amount,0);
  const paidPrev=filPrev.filter(p=>p.status==="paid").reduce((s,p)=>s+p.amount,0);
  const pend=fil.filter(p=>p.status==="pending").reduce((s,p)=>s+p.amount,0);
  const efec=fil.filter(p=>p.method==="efectivo"&&p.status==="paid").reduce((s,p)=>s+p.amount,0);
  const dig=fil.filter(p=>p.method==="digital"&&p.status==="paid").reduce((s,p)=>s+p.amount,0);
  const diff=paid-paidPrev;
  const diffPct=paidPrev>0?Math.round((diff/paidPrev)*100):null;

  // All-time pending by patient
  const pendingByPatient=useMemo(()=>{
    const byPat={};
    payments.filter(p=>p.status==="pending").forEach(p=>{
      if(!byPat[p.patientId])byPat[p.patientId]={name:p.patientName,total:0,count:0};
      byPat[p.patientId].total+=p.amount;
      byPat[p.patientId].count++;
    });
    return Object.values(byPat).sort((a,b)=>b.total-a.total);
  },[payments]);

  const totalPending=payments.filter(p=>p.status==="pending").reduce((s,p)=>s+p.amount,0);

  const add=()=>{
    const p=patients.find(p=>p.id===parseInt(form.patientId));if(!p)return;
    setData(d=>({...d,payments:[...d.payments,{id:Date.now(),patientId:p.id,patientName:p.name,date:form.date,amount:parseInt(form.amount),method:form.method,concept:form.concept||"Pago",status:"paid"}]}));
    setModal(false);
    setForm({patientId:"",amount:String(DEFAULT_FEE),method:"efectivo",concept:"",date:today});
  };

  const markPaid=(id,method)=>setData(d=>({...d,payments:d.payments.map(p=>p.id===id?{...p,status:"paid",method:method||p.method}:p)}));
  const deletePayment=(id)=>{if(!confirm("¿Eliminar este pago?"))return;setData(d=>({...d,payments:d.payments.filter(p=>p.id!==id)}));};

  const MC={efectivo:C.green,digital:C.accent,pendiente:C.yellow};
  const ML={efectivo:"💵 Efectivo",digital:"📱 Digital",pendiente:"⏳ Pendiente"};

  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div><h2 style={{fontFamily:"Fraunces",fontSize:22,fontWeight:400}}>Pagos</h2>
          <p style={{color:C.muted,fontSize:13}}>Control de ingresos</p>
        </div>
        <Btn onClick={()=>setModal(true)}>+ Registrar</Btn>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[{id:"resumen",l:"Resumen"},{id:"detalle",l:"Detalle"},{id:"pendientes",l:"Pendientes"+(pendingByPatient.length>0?" ("+pendingByPatient.length+")":"")}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"6px 14px",borderRadius:20,border:`1px solid ${tab===t.id?C.accent:C.border}`,background:tab===t.id?C.accent:"transparent",color:tab===t.id?"#fff":C.muted,fontSize:12,fontWeight:500}}>
            {t.l}
          </button>
        ))}
      </div>

      {/* ── RESUMEN ── */}
      {tab==="resumen"&&(
        <>
          {/* Month picker */}
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
            <label style={{fontSize:12,color:C.muted}}>Mes:</label>
            <input type="month" value={month} onChange={e=>setMonth(e.target.value)}
              style={{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",fontSize:12}}/>
          </div>

          {/* Stats row */}
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <Stat label="Cobrado" value={`$${paid.toLocaleString()}`} sub={`${fil.filter(p=>p.status==="paid").length} pagos`} color={C.green}/>
            <Stat label="Por cobrar" value={`$${pend.toLocaleString()}`} color={pend>0?C.yellow:C.muted}/>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            <Stat label="💵 Efectivo" value={`$${efec.toLocaleString()}`}/>
            <Stat label="📱 Digital" value={`$${dig.toLocaleString()}`}/>
          </div>

          {/* Month comparison */}
          {paidPrev>0&&(
            <Card style={{marginBottom:14,padding:"12px 14px"}}>
              <div style={{fontSize:11,color:C.muted,marginBottom:6}}>VS MES ANTERIOR (${paidPrev.toLocaleString()})</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18,fontWeight:700,color:diff>=0?C.green:C.red}}>
                  {diff>=0?"▲":"▼"} ${Math.abs(diff).toLocaleString()}
                </span>
                {diffPct!==null&&<Badge color={diff>=0?C.green:C.red}>{diff>=0?"+":""}{diffPct}%</Badge>}
              </div>
            </Card>
          )}

          {/* Payment list for month */}
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {fil.length===0
              ?<Card style={{textAlign:"center",padding:32,color:C.muted}}>Sin registros este mes</Card>
              :[...fil].sort((a,b)=>b.date.localeCompare(a.date)).map(p=>(
                <Card key={p.id} style={{padding:"11px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:500}}>{p.patientName}</div>
                      <div style={{fontSize:11,color:C.muted}}>{p.concept} · {p.date}</div>
                    </div>
                    <Badge color={MC[p.method||"pendiente"]}>{ML[p.method||"pendiente"]}</Badge>
                    <div style={{fontSize:14,fontWeight:600,color:p.status==="paid"?C.green:C.yellow}}>${p.amount.toLocaleString()}</div>
                    <button onClick={()=>deletePayment(p.id)} style={{background:"none",border:"none",color:C.muted,fontSize:14,padding:"2px 4px",flexShrink:0}}>✕</button>
                  </div>
                  {p.status==="pending"&&(
                    <div style={{display:"flex",gap:6,marginTop:8}}>
                      <button onClick={()=>markPaid(p.id,"efectivo")}
                        style={{flex:1,background:C.green+"18",border:`1px solid ${C.green}44`,borderRadius:8,color:C.green,fontSize:11,fontWeight:600,padding:"5px 0"}}>
                        💵 Cobrar efectivo
                      </button>
                      <button onClick={()=>markPaid(p.id,"digital")}
                        style={{flex:1,background:C.accent+"18",border:`1px solid ${C.accent}44`,borderRadius:8,color:C.al,fontSize:11,fontWeight:600,padding:"5px 0"}}>
                        📱 Cobrar digital
                      </button>
                    </div>
                  )}
                </Card>
              ))
            }
          </div>
        </>
      )}

      {/* ── DETALLE ── */}
      {tab==="detalle"&&(
        <>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14}}>
            <label style={{fontSize:12,color:C.muted}}>Mes:</label>
            <input type="month" value={month} onChange={e=>setMonth(e.target.value)}
              style={{background:C.card,color:C.text,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 10px",fontSize:12}}/>
          </div>
          {/* Per-patient summary for month */}
          {(()=>{
            const byPat={};
            fil.forEach(p=>{
              if(!byPat[p.patientId])byPat[p.patientId]={name:p.patientName,paid:0,pending:0,efec:0,dig:0,count:0};
              if(p.status==="paid"){byPat[p.patientId].paid+=p.amount;if(p.method==="efectivo")byPat[p.patientId].efec+=p.amount;else byPat[p.patientId].dig+=p.amount;}
              else byPat[p.patientId].pending+=p.amount;
              byPat[p.patientId].count++;
            });
            const rows=Object.values(byPat).sort((a,b)=>b.paid-a.paid);
            return rows.length===0
              ?<Card style={{textAlign:"center",padding:32,color:C.muted}}>Sin registros este mes</Card>
              :rows.map((r,i)=>(
                <Card key={i} style={{marginBottom:8,padding:"12px 14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div style={{fontWeight:600,fontSize:14}}>{r.name}</div>
                    <div style={{fontSize:15,fontWeight:700,color:C.green}}>${r.paid.toLocaleString()}</div>
                  </div>

      )}

      {/* ── PENDIENTES ── */}

                  {patientPays.length>0&&(

                        style={{flex:1,background:C.accent+"18",border:`1px solid ${C.accent}44`,borderRadius:8,color:C.al,fontSize:11,fontWeight:600,padding:"7px 0"}}>

                    </div>

      )}

      {/* ── Modal registrar pago ── */}
      {modal&&(
        <Sheet onClose={()=>setModal(false)} title="Registrar Pago">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {patients.length===0?<div style={{textAlign:"center",padding:20,color:C.muted,fontSize:13}}>Primero agrega pacientes 👤</div>:(
              <>
                <Fld label="Paciente" value={form.patientId} onChange={v=>setForm(f=>({...f,patientId:v}))} options={[{v:"",l:"Seleccionar..."}, ...patients.map(p=>({v:p.id,l:p.name}))]}/>
                <Fld label="Fecha" type="date" value={form.date} onChange={v=>setForm(f=>({...f,date:v}))}/>
                <Fld label="Monto (pesos)" type="number" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} placeholder={String(DEFAULT_FEE)}/>
                <div style={{display:"flex",gap:6}}>{[1000,1500,2000,2500,3000].map(a=>(<button key={a} onClick={()=>setForm(f=>({...f,amount:String(a)}))} style={{flex:1,background:form.amount===String(a)?C.accent:C.surface,color:form.amount===String(a)?"#fff":C.muted,border:`1px solid ${form.amount===String(a)?C.accent:C.border}`,borderRadius:8,padding:"7px 0",fontSize:11,fontWeight:500}}>${a/1000}k</button>))}</div>
                <Fld label="Método" value={form.method} onChange={v=>setForm(f=>({...f,method:v}))} options={[{v:"efectivo",l:"💵 Efectivo"},{v:"digital",l:"📱 Digital"}]}/>
                <Fld label="Concepto" value={form.concept} onChange={v=>setForm(f=>({...f,concept:v}))} placeholder="Sesión #7"/>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={add} disabled={!form.patientId}>Guardar</Btn></div>
              </>
            )}
          </div>
        </Sheet>
      )}
    </div>
  );
}

function Perfil({data,setData}){
  const therapist=data.therapist;
  const [editing,setEditing]=useState(!therapist.name);
  const [draft,setDraft]=useState(therapist);
  const [shareModal,setSM]=useState(false);
  const [copied,setCopied]=useState("");
  const [apiKeyInput,setApiKeyInput]=useState(data.apiKey||"");
  const [apiKeySaved,setApiKeySaved]=useState(false);

  const save=()=>{setData(d=>({...d,therapist:draft}));setEditing(false);};
  const cancel=()=>{setDraft(therapist);setEditing(false);};
  const addPM=()=>setDraft(d=>({...d,payments:[...d.payments,{id:Date.now(),label:"Nuevo medio",value:""}]}));
  const rmPM=id=>setDraft(d=>({...d,payments:d.payments.filter(p=>p.id!==id)}));
  const upPM=(id,field,val)=>setDraft(d=>({...d,payments:d.payments.map(p=>p.id===id?{...p,[field]:val}:p)}));
  const copy=(text,key)=>{navigator.clipboard?.writeText(text).then(()=>{setCopied(key);setTimeout(()=>setCopied(""),2000);}).catch(()=>{});};
  const shareText=()=>{const t=therapist;return[t.name||"Terapeuta",t.specialty,t.cedula?"Cédula: "+t.cedula:"","",t.address?"📍 "+t.address:"",t.phone?"📞 "+t.phone:"",t.email?"✉ "+t.email:"","","💳 Medios de pago:",...t.payments.filter(p=>p.value).map(p=>"  "+p.label+": "+p.value)].filter(Boolean).join("\n");};
  const saveApiKey=()=>{setData(d=>({...d,apiKey:apiKeyInput.trim()}));setApiKeySaved(true);setTimeout(()=>setApiKeySaved(false),2000);};

  return (
    <div className="fi">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div><h2 style={{fontFamily:"Fraunces",fontSize:22,fontWeight:400}}>Mi Perfil</h2></div>
        <div style={{display:"flex",gap:8}}>
          {!editing&&<Btn variant="ghost" small onClick={()=>setSM(true)}>📤</Btn>}
          {!editing?<Btn small onClick={()=>{setDraft(therapist);setEditing(true);}}>✏ Editar</Btn>:<><Btn variant="ghost" small onClick={cancel}>Cancelar</Btn><Btn small onClick={save}>Guardar</Btn></>}
        </div>
      </div>
      <Card style={{marginBottom:14,background:`linear-gradient(135deg,${C.card},${C.surface})`}}>
        <div style={{display:"flex",gap:14,alignItems:"center",marginBottom:12}}>
          <div style={{width:54,height:54,borderRadius:"50%",background:C.accent+"44",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:C.al,flexShrink:0}}>{therapist.name?therapist.name.split(" ").map(n=>n[0]).join("").slice(0,2):"👤"}</div>
          <div><div style={{fontFamily:"Fraunces",fontSize:17,fontWeight:400}}>{therapist.name||<span style={{color:C.muted,fontStyle:"italic",fontSize:13}}>Sin nombre</span>}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{therapist.specialty}</div>{therapist.cedula&&<div style={{fontSize:11,color:C.muted}}>Céd: {therapist.cedula}</div>}</div>
        </div>
        {!editing&&<div style={{display:"flex",flexDirection:"column",gap:4}}>{therapist.address&&<div style={{fontSize:12,color:C.muted}}>📍 {therapist.address}</div>}{therapist.phone&&<div style={{fontSize:12,color:C.muted}}>📞 {therapist.phone}</div>}{therapist.email&&<div style={{fontSize:12,color:C.muted}}>✉ {therapist.email}</div>}</div>}
      </Card>
      {editing&&(
        <Card style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:14}}>Datos personales</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <Fld label="Nombre completo" value={draft.name} onChange={v=>setDraft(d=>({...d,name:v}))} placeholder="Dra. / Lic. Nombre Apellido"/>
            <Fld label="Especialidad" value={draft.specialty} onChange={v=>setDraft(d=>({...d,specialty:v}))} placeholder="Psicología Clínica"/>
            <Fld label="Cédula profesional" value={draft.cedula} onChange={v=>setDraft(d=>({...d,cedula:v}))} placeholder="12345678"/>
            <Fld label="Dirección" value={draft.address} onChange={v=>setDraft(d=>({...d,address:v}))} placeholder="Calle, Colonia, Ciudad"/>
            <Fld label="Teléfono / WhatsApp" value={draft.phone} onChange={v=>setDraft(d=>({...d,phone:v}))} placeholder="+52 55 0000 0000" type="tel"/>
            <Fld label="Correo electrónico" value={draft.email} onChange={v=>setDraft(d=>({...d,email:v}))} placeholder="correo@ejemplo.com" type="email"/>
          </div>
        </Card>
      )}

      {/* API KEY SECTION */}
      <Card style={{marginBottom:14,borderColor:data.apiKey?C.green+"44":C.border}}>
        <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>🤖 API Key — Chat IA</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:10,lineHeight:1.6}}>
          Para usar el chat con IA necesitas una API key de Anthropic.<br/>
          Obtén una gratis en <span style={{color:C.al}}>console.anthropic.com</span>
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} type="password" placeholder="sk-ant-api03-..." style={{flex:1,background:C.surface,color:C.text,border:`1px solid ${data.apiKey?C.green+"66":C.border}`,borderRadius:8,padding:"10px 12px",fontSize:13}}/>
          <button onClick={saveApiKey} style={{background:apiKeySaved?C.green:C.accent,color:"#fff",borderRadius:8,padding:"10px 16px",fontSize:13,fontWeight:500,flexShrink:0}}>
            {apiKeySaved?"✓":"Guardar"}
          </button>
        </div>
        {data.apiKey&&<div style={{fontSize:11,color:C.green,marginTop:6}}>✓ API key configurada — chat activo</div>}
      </Card>

      {/* ── BACKUP / RESTORE ── */}
      {(()=>{
        const [importError,setImportError]=useState("");
        const [importOk,setImportOk]=useState(false);

        const exportBackup=()=>{
          const payload=JSON.stringify(data,null,2);
          const blob=new Blob([payload],{type:"application/json"});
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          const dateStr=new Date().toISOString().slice(0,10);
          a.href=url;
          a.download=`sonia-backup-${dateStr}.json`;
          a.click();
          URL.revokeObjectURL(url);
        };

        const importBackup=(e)=>{
          const file=e.target.files?.[0];
          if(!file)return;
          setImportError("");setImportOk(false);
          const reader=new FileReader();
          reader.onload=evt=>{
            try{
              const parsed=JSON.parse(evt.target.result);
              // Basic validation
              if(!parsed.patients||!parsed.appointments||!parsed.payments){
                setImportError("Archivo inválido — no parece un backup de Sonia.");
                return;
              }
              if(!confirm(`¿Restaurar backup?\n\nEsto reemplazará todos tus datos actuales con:\n• ${parsed.patients.length} pacientes\n• ${parsed.appointments.length} citas\n• ${parsed.payments.length} pagos\n\nTus datos actuales se perderán.`))return;
              setData({...SEED,...parsed});
              setImportOk(true);
              setTimeout(()=>setImportOk(false),4000);
            }catch{
              setImportError("No se pudo leer el archivo. ¿Es un JSON válido?");
            }
          };
          reader.readAsText(file);
          e.target.value=""; // reset input
        };

        const stats=`${data.patients.length} pac · ${data.appointments.length} citas · ${data.payments.length} pagos`;

        return (
          <Card style={{marginBottom:14,borderColor:C.green+"44"}}>
            <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5,marginBottom:12}}>💾 Backup y restauración</div>
            <div style={{fontSize:12,color:C.muted,lineHeight:1.6,marginBottom:14}}>
              Los datos se guardan solo en este teléfono. Exportá un backup antes de reinstalar la app o cambiar de dispositivo.
            </div>
            <div style={{background:C.bg,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.muted,marginBottom:14}}>
              Datos actuales: <span style={{color:C.text,fontWeight:500}}>{stats}</span>
            </div>

            {/* Export */}
            <button onClick={exportBackup}
              style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",background:C.green+"18",border:`1px solid ${C.green}44`,borderRadius:10,padding:"12px 0",color:C.green,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:10}}>
              📤 Exportar backup (.json)
            </button>

            {/* Import */}
            <label style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",background:C.accent+"18",border:`1px solid ${C.accent}44`,borderRadius:10,padding:"12px 0",color:C.al,fontSize:13,fontWeight:600,cursor:"pointer"}}>
              📥 Importar backup
              <input type="file" accept=".json,application/json" onChange={importBackup} style={{display:"none"}}/>
            </label>

            {importOk&&(
              <div style={{marginTop:10,background:C.green+"18",border:`1px solid ${C.green}44`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.green}}>
                ✓ Datos restaurados correctamente
              </div>
            )}
            {importError&&(
              <div style={{marginTop:10,background:C.red+"18",border:`1px solid ${C.red}44`,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.red}}>
                ❌ {importError}
              </div>
            )}

            <div style={{marginTop:12,fontSize:11,color:C.muted,lineHeight:1.6}}>
              💡 <strong style={{color:C.text}}>Para cambiar de dispositivo:</strong> exportá el backup, abrí Sonia en el nuevo teléfono, e importá el archivo.
            </div>
          </Card>
        );
      })()}

      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:.5}}>💳 Medios de pago</div>
          {editing&&<Btn variant="ghost" small onClick={addPM}>+ Agregar</Btn>}
        </div>
        {(editing?draft.payments:therapist.payments).length===0&&<div style={{textAlign:"center",color:C.muted,fontSize:12,padding:"14px 0"}}>Sin medios configurados</div>}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {(editing?draft.payments:therapist.payments).map(pm=>(
            <div key={pm.id}>
              {editing?(
                <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
                  <div style={{flex:1}}><Fld label="Tipo" value={pm.label} onChange={v=>upPM(pm.id,"label",v)} placeholder="CLABE, Mercado Pago..."/></div>
                  <div style={{flex:2}}><Fld label="Cuenta" value={pm.value} onChange={v=>upPM(pm.id,"value",v)} placeholder="0000..."/></div>
                  <button onClick={()=>rmPM(pm.id)} style={{background:C.red+"22",border:`1px solid ${C.red}44`,borderRadius:8,color:C.red,padding:"10px 10px",fontSize:14,flexShrink:0}}>✕</button>
                </div>
              ):(
                <div style={{background:C.surface,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div><div style={{fontSize:11,color:C.muted,marginBottom:2}}>{pm.label}</div><div style={{fontSize:14,fontWeight:500,fontFamily:"monospace"}}>{pm.value||<span style={{color:C.muted,fontStyle:"italic",fontFamily:"inherit",fontSize:12}}>Sin configurar</span>}</div></div>
                  {pm.value&&<button onClick={()=>copy(pm.value,pm.id)} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,color:copied===pm.id?C.green:C.muted,padding:"6px 12px",fontSize:12}}>{copied===pm.id?"✓":"Copiar"}</button>}
                </div>
              )}
            </div>
          ))}
        </div>
      </Card>
      {shareModal&&(
        <Sheet onClose={()=>setSM(false)} title="Compartir datos de pago">
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:C.bg,borderRadius:10,padding:"14px",fontSize:12,lineHeight:1.8,whiteSpace:"pre-line",fontFamily:"monospace",border:`1px solid ${C.border}`,color:C.text}}>{shareText()}</div>
            <div style={{display:"flex",gap:8}}><Btn full onClick={()=>copy(shareText(),"all")}>{copied==="all"?"✓ Copiado":"📋 Copiar"}</Btn>{navigator.share&&<Btn variant="ghost" full onClick={()=>navigator.share({title:"Datos de pago",text:shareText()}).catch(()=>{})}>📤 Compartir</Btn>}</div>
          </div>
        </Sheet>
      )}
    </div>
  );
}

      <div style={{padding:"14px 14px 110px"}}>
        {tab==="pacientes"&&<Pacientes data={data} setData={setData}/>}
        {tab==="agenda"&&<Agenda data={data} setData={setData} slotDays={slotDays} setSlotDays={setSlotDays}/>}
        {tab==="pagos"&&<Pagos data={data} setData={setData}/>}
        {tab==="chat"&&<Chatbot dataRef={dataRef} setData={setData} setTab={setTab}/>}
        {tab==="perfil"&&<Perfil data={data} setData={setData}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:560,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",padding:"6px 0 env(safe-area-inset-bottom,10px)",zIndex:60}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",padding:"7px 0",color:tab===t.id?C.accent:C.muted,display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"color .15s",position:"relative"}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:500,letterSpacing:.2}}>{t.l}</span>
            {t.id==="pagos"&&pendN>0&&<div style={{position:"absolute",top:4,right:"18%",width:7,height:7,borderRadius:"50%",background:C.yellow}}/>}
          </button>
        ))}
      </div>
      {tab!=="chat"&&<MicButton dataRef={dataRef} setData={setData} setTab={setTab} setSlotDays={setSlotDays}/>}

      {/* Session confirmation prompt — appears ~1hr after appointment ends */}
      {prompt&&(
        <SessionPrompt
          appt={prompt}
          patients={data.patients}
          onResolve={resolvePrompt}
          onDismiss={dismissPrompt}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- Register service worker from same origin (required for PWA install) -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW registration failed:', e));
  });
}
</script>

<!-- Android/Chrome install prompt -->
<script>
let _dp = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _dp = e;
  // Show after 4 seconds
  setTimeout(() => {
    if (!_dp) return;
    const banner = document.createElement('div');
    banner.id = 'install-banner';
    banner.innerHTML = `
      <div style="position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:528px;background:#1e2235;border:1px solid #2a3050;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.6);font-family:'DM Sans',sans-serif;">
        <div style="display:flex;align-items:center;gap:12px;">
          <img src="icon-192.png" width="36" height="36" style="border-radius:8px;"/>
          <div>
            <div style="color:#e8eaf6;font-size:13px;font-weight:600;">Instalar Sonia</div>
            <div style="color:#7b83a6;font-size:11px;">App de consultorio</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button id="sonia-dismiss" style="background:transparent;border:1px solid #2a3050;color:#7b83a6;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;">No</button>
          <button id="sonia-install" style="background:#6c8fff;border:none;color:#fff;padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;font-family:inherit;">Instalar</button>
        </div>
      </div>`;
    document.body.appendChild(banner);
    document.getElementById('sonia-install').onclick = () => {
      _dp.prompt();
      _dp.userChoice.then(() => { banner.remove(); _dp = null; });
    };
    document.getElementById('sonia-dismiss').onclick = () => banner.remove();
  }, 4000);
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner')?.remove();
  _dp = null;
});
</script>
</body>
</html>

// ─── NOTIFICATION ENGINE ─────────────────────────────────────────────────────
function useNotifications(data,setData){
  const permRef=useRef(false);
  const [prompt,setPrompt]=useState(null);
  const [dailyBrief,setDailyBrief]=useState(null);

  const requestPerm=useCallback(async()=>{
    if(!('Notification' in window))return false;
    if(Notification.permission==="granted"){permRef.current=true;return true;}
    if(Notification.permission==="denied")return false;
    const r=await Notification.requestPermission();
    permRef.current=r==="granted";
    return permRef.current;
  },[]);

  // Daily briefing on app open
  useEffect(()=>{
    const todayStr=getToday();
    const lastShown=localStorage.getItem("sonia_brief_date");
    if(lastShown===todayStr)return;
    const todayAppts=data.appointments.filter(a=>a.date===todayStr&&a.status!=="cancelled").sort((a,b)=>a.time.localeCompare(b.time));
    const withFuture=new Set(data.appointments.filter(a=>a.date>=todayStr&&a.status!=="cancelled").map(a=>a.patientId));
    const sinHora=data.patients.filter(p=>!withFuture.has(p.id));
    const isMonday=new Date(todayStr+"T12:00:00").getDay()===1;
    if(todayAppts.length>0||sinHora.length>0){
      setDailyBrief({appts:todayAppts,sinHora,isMonday});
      localStorage.setItem("sonia_brief_date",todayStr);
      if(Notification.permission==="granted"){
        let body=todayAppts.length>0?"Hoy: "+todayAppts.map(a=>a.time+" "+a.patientName).join(", "):"Sin citas hoy.";
        if(sinHora.length>0)body+=" Sin hora: "+sinHora.map(p=>p.name.split(" ")[0]).join(", ");
        try{new Notification("🌿 Sonia — Agenda del día",{body,icon:"./icon-192.png",tag:"morning"});}catch(e){}
      }
    }
  // eslint-disable-next-line
  },[]);

  // Post-session check every minute
  useEffect(()=>{
    const check=()=>{
      const now=new Date();
      const todayStr=now.toISOString().split("T")[0];
      const nowMins=now.getHours()*60+now.getMinutes();
      const c=data.appointments.filter(a=>{
        if(a.date!==todayStr||a.status!=="confirmed"||a._prompted)return false;
        const [hh,mm]=a.time.split(":").map(Number);
        const diff=nowMins-(hh*60+mm+50);
        return diff>=5&&diff<=90;
      });
      if(c.length>0&&!prompt){
        const a=c[0];
        setPrompt(a);
        if(Notification.permission==="granted"){
          try{new Notification("Sonia — Confirmar sesión",{body:"¿Se realizó la sesión de "+a.patientName+"?",icon:"./icon-192.png",tag:"session-"+a.id});}catch(e){}
        }
      }
    };
    const t=setInterval(check,60000);
    check();
    return()=>clearInterval(t);
  },[data.appointments,prompt]);

  const resolvePrompt=useCallback((apptId,done,paid,fee,method)=>{
    setData(d=>{
      const appts=d.appointments.map(a=>a.id!==apptId?a:{...a,status:done?"done":"cancelled",_prompted:true});
      let pays=d.payments;
      if(done&&paid){
        const a=d.appointments.find(a=>a.id===apptId);
        if(a)pays=[...pays,{id:Date.now(),patientId:a.patientId,patientName:a.patientName,date:getToday(),amount:fee||DEFAULT_FEE,method:method||"efectivo",concept:"Sesión "+a.time,status:"paid"}];
      }
      return{...d,appointments:appts,payments:pays};
    });
    setPrompt(null);
  },[setData]);

  const dismissPrompt=useCallback(id=>{
    setData(d=>({...d,appointments:d.appointments.map(a=>a.id===id?{...a,_prompted:true}:a)}));
    setPrompt(null);
  },[setData]);

  return{requestPerm,prompt,resolvePrompt,dismissPrompt,dailyBrief,setDailyBrief};
}

        )
      )
    )
  );

// ─── VOICE ENGINE ─────────────────────────────────────────────────────────────
function useVoice(onResult){
  const[listening,setListening]=useState(false);
  const[status,setStatus]=useState("");
  const recRef=useRef(null);
  const permOk=useRef(false);
  const flash=useCallback(msg=>{setStatus(msg);setTimeout(()=>setStatus(""),5000);},[]);
  const speak=useCallback(txt=>{
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang="es-MX";u.rate=1.0;
    setTimeout(()=>window.speechSynthesis.speak(u),100);
  },[]);
  const doRecognize=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){flash("⚠ Usá Chrome en Android para reconocimiento de voz");return;}
    if(recRef.current){try{recRef.current.stop();}catch(e){}}
    const r=new SR();
    r.lang="";r.continuous=false;r.interimResults=false;r.maxAlternatives=8;
    r.onstart=()=>{setListening(true);flash("🎤 Escuchando...");};
    r.onresult=e=>{
      setListening(false);
      const alts=[];
      for(let i=0;i<e.results[0].length;i++)alts.push(e.results[0][i].transcript);
      flash("🎤 "+alts[0]);
      onResult(alts,speak,flash);
    };
    r.onerror=e=>{
      setListening(false);
      const msgs={"not-allowed":"❌ Micrófono bloqueado — toca 🔒 en Chrome → Micrófono → Permitir","no-speech":"Sin audio — hablá más cerca","network":"Sin conexión","aborted":""};
      const m=msgs[e.error];
      if(m!==undefined&&m!=="")flash(m);
      else if(m===undefined)flash("❌ Error de voz: "+e.error);
    };
    r.onend=()=>setListening(false);
    recRef.current=r;
    try{r.start();}catch(err){setListening(false);flash("❌ "+err.message);}
  },[onResult,flash]);
  const start=useCallback(()=>{
    if(listening){try{recRef.current&&recRef.current.stop();}catch(e){}setListening(false);return;}
    if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&!permOk.current){
      flash("🎙 Solicitando micrófono...");
      navigator.mediaDevices.getUserMedia({audio:true,video:false})
        .then(stream=>{stream.getTracks().forEach(t=>t.stop());permOk.current=true;setTimeout(doRecognize,200);})
        .catch(err=>flash(err.name==="NotAllowedError"?"❌ Micrófono bloqueado — toca 🔒 → Micrófono → Permitir":"❌ "+err.message));
    }else doRecognize();
  },[listening,doRecognize,flash]);
  return{listening,status,start,speak,flash};
}

// ─── VOICE COMMANDS ───────────────────────────────────────────────────────────
function processVoice(alts,dataRef,setData,setTab,speak,flash,setSlotDays){
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
  const{patients,appointments,payments}=dataRef.current;
  const has=(t,...ws)=>ws.some(w=>t.includes(w));
  const matchPt=hint=>{
    const h=norm(hint);
    return patients.find(p=>norm(p.name).split(" ").filter(w=>w.length>2).some(w=>h.includes(w)));
  };
  const DOW={lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6,domingo:0,lun:1,mar:2,mie:3,jue:4,vie:5,sab:6,dom:0};
  for(const raw of alts){
    const t=norm(raw);
    console.log("[Voice]",t);
    // NAV
    const nav=has(t,"ir","abrir","ver","mostrar","vamos","lleva","abre","muestra","navega")||t.split(" ").length<=3;
    if(nav&&has(t,"agenda","calendario","horario")){setTab("agenda");speak("Agenda");return;}
    if(nav&&has(t,"pago","pagos","cobro","cobros","dinero")){setTab("pagos");speak("Pagos");return;}
    if(nav&&has(t,"perfil","configuracion","cuenta")){setTab("perfil");speak("Perfil");return;}
    if(nav&&has(t,"chat","asistente","sonia","ayuda")){setTab("chat");speak("Chat");return;}
    if(nav&&has(t,"paciente","listado","lista")){setTab("pacientes");speak("Pacientes");return;}
    // ADD PATIENT
    if(has(t,"paciente")&&has(t,"agregar","nuevo","añadir","crear","registrar")){
      const after=t.replace(/agregar|nuevo|añadir|crear|registrar|paciente/g,"").trim();
      const dayKeys=Object.keys(DOW).join("|");
      const nameOnly=after.replace(new RegExp("(?:los?\\s+)?("+dayKeys+")","g"),"").replace(/a las?|las?|\d{1,2}:\d{2}|\d{1,2}\s*hs?/g,"").replace(/\s+/g," ").trim();
      const fullName=nameOnly.split(" ").filter(w=>w.length>1).map(w=>w[0].toUpperCase()+w.slice(1)).join(" ").trim();
      if(!fullName||fullName.length<3){flash("❌ No entendí el nombre");continue;}
      const dm=t.match(new RegExp("(?:los?\\s+)?("+dayKeys+")"));
      const dow=dm?DOW[dm[1]]:null;
      const tm=t.match(/(\d{1,2}):(\d{2})|(?:a las?|las?)\s*(\d{1,2})/);
      const time=tm?(String(parseInt(tm[1]||tm[3])).padStart(2,"0")+":"+(tm[2]||"00")):null;
      let apptDate=null;
      if(dow!==null&&time){const b=new Date(getToday()+"T12:00:00");for(let i=0;i<7;i++){if(b.getDay()===dow)break;b.setDate(b.getDate()+1);}if(b.getDay()===dow)apptDate=b.toISOString().split("T")[0];}
      const ex=patients.find(p=>norm(p.name).includes(norm(fullName))||norm(fullName).includes(norm(p.name)));
      if(ex){
        if(apptDate&&time){setData(d=>({...d,appointments:[...d.appointments,{id:Date.now(),patientId:ex.id,patientName:ex.name,date:apptDate,time,duration:50,status:"confirmed",fee:DEFAULT_FEE}]}));speak("Cita para "+ex.name.split(" ")[0]);flash("✓ "+ex.name+" "+apptDate+" "+time);}
        else{speak(fullName+" ya existe");flash("Ya existe: "+fullName);}
      }else{
        const np={id:Date.now(),name:fullName,phone:"",email:"",since:getToday()};

// ─── FREQUENCY HELPERS ────────────────────────────────────────────────────────
function computeNextSuggested(patient,appointments){
  const{frequency,preferredDay,preferredTime}=patient;
  if(!frequency||frequency==="none"||preferredDay===undefined||!preferredTime)return null;
  const intervalDays=frequency==="weekly"?7:14;
  const today=getToday();
  const targetDow=parseInt(preferredDay);
  function findNextDow(base,dow){const d=new Date(base);let t=0;while(d.getDay()!==dow&&t<14){d.setDate(d.getDate()+1);t++;}return new Date(d);}
  const pAppts=appointments.filter(a=>a.patientId===patient.id&&(a.status==="confirmed"||a.status==="done")).sort((a,b)=>b.date.localeCompare(a.date));
  let cursor;
  if(pAppts.length>0){const next=new Date(pAppts[0].date+"T12:00:00");next.setDate(next.getDate()+intervalDays);cursor=findNextDow(next,targetDow);}
  else cursor=findNextDow(new Date(today+"T12:00:00"),targetDow);
  const ds=cursor.toISOString().split("T")[0];
  return ds>=today?{date:ds,time:preferredTime}:null;
}

// ─── AUTO SCHEDULE ────────────────────────────────────────────────────────────
function autoScheduleSessions(patient,appointments,weeksAhead){
  weeksAhead=weeksAhead||8;
  const{frequency,preferredDay,preferredTime}=patient;
  if(!frequency||frequency==="none"||preferredDay===undefined||!preferredTime)return[];
  const intervalDays=frequency==="weekly"?7:14;
  const today=getToday(),horizon=addDays(today,weeksAhead*7),targetDow=parseInt(preferredDay);
  const existing=new Set(appointments.filter(a=>a.patientId===patient.id&&a.status!=="cancelled").map(a=>a.date+"T"+a.time));
  function findNextDow2(base,dow){const d=new Date(base);let t=0;while(d.getDay()!==dow&&t<14){d.setDate(d.getDate()+1);t++;}return new Date(d);}
  const pAppts=appointments.filter(a=>a.patientId===patient.id&&(a.status==="confirmed"||a.status==="done")).sort((a,b)=>b.date.localeCompare(a.date));
  let cursor;
  if(pAppts.length>0){const next=new Date(pAppts[0].date+"T12:00:00");next.setDate(next.getDate()+intervalDays);cursor=findNextDow2(next,targetDow);}
  else cursor=findNextDow2(new Date(today+"T12:00:00"),targetDow);
  const toCreate=[];let safety=0;
  while(safety++<60){
    const ds=cursor.toISOString().split("T")[0];
    if(ds>horizon)break;
    if(ds>=today){const key=ds+"T"+preferredTime;if(!existing.has(key)){toCreate.push({date:ds,time:preferredTime});existing.add(key);}}
    cursor.setDate(cursor.getDate()+intervalDays);cursor=findNextDow2(cursor,targetDow);
  }
  return toCreate;
}

          React.createElement("div",{style:{width:38,height:38,borderRadius:12,background:"linear-gradient(135deg,#1e2235,#2a3050)",border:"1px solid "+C.border,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",flexShrink:0}},CAT_SVG),
          React.createElement("div",null,
            React.createElement("div",{style:{fontFamily:"Fraunces",fontSize:26,fontWeight:300,letterSpacing:-.8,lineHeight:1}},React.createElement("span",{style:{fontStyle:"italic",background:"linear-gradient(90deg,#8facff,#6c8fff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"Sonia")),
            React.createElement("div",{style:{fontSize:10,color:C.muted,letterSpacing:.3,marginTop:1}},data.therapist.name||"Consultorio")
          )
        ),
        React.createElement("div",{style:{display:"flex",gap:6,alignItems:"center"}},
          todayN>0&&React.createElement(Badge,{color:C.accent},todayN+" hoy"),
          pendN>0&&React.createElement(Badge,{color:C.yellow},"$"+data.payments.filter(p=>p.status==="pending").reduce((s,p)=>s+p.amount,0).toLocaleString())
        )
      )
    ),
    // Content
    React.createElement("div",{style:{padding:"14px 14px 110px"}},
      tab==="pacientes"&&React.createElement(Pacientes,{data,setData}),
      tab==="agenda"&&React.createElement(Agenda,{data,setData,slotDays,setSlotDays}),
      tab==="pagos"&&(needsPin?React.createElement(PinLock,{pin:data.paymentsPin,onSuccess:()=>setPinUnlocked(true)}):React.createElement(Pagos,{data,setData})),
      tab==="chat"&&React.createElement(Chatbot,{dataRef,setData,setTab:changeTab}),
      tab==="perfil"&&React.createElement(Perfil,{data,setData})
    ),
    // Nav bar
    React.createElement("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:560,background:C.surface,borderTop:"1px solid "+C.border,display:"flex",padding:"6px 0 env(safe-area-inset-bottom,10px)",zIndex:60}},
      tabs.map(t=>React.createElement("button",{key:t.id,onClick:()=>changeTab(t.id),style:{flex:1,background:"none",border:"none",padding:"7px 0",color:tab===t.id?C.accent:C.muted,display:"flex",flexDirection:"column",alignItems:"center",gap:2,transition:"color .15s",position:"relative"}},
        React.createElement("span",{style:{fontSize:18}},t.id==="pagos"&&pinActive&&!pinUnlocked?"🔒":t.icon),
        React.createElement("span",{style:{fontSize:9,fontWeight:500,letterSpacing:.2}},t.l),
        t.id==="pagos"&&pendN>0&&React.createElement("div",{style:{position:"absolute",top:4,right:"18%",width:7,height:7,borderRadius:"50%",background:C.yellow}})
      ))
    ),
    tab!=="chat"&&React.createElement(MicButton,{dataRef,setData,setTab:changeTab,setSlotDays}),
    prompt&&React.createElement(SessionPrompt,{appt:prompt,onResolve:resolvePrompt,onDismiss:dismissPrompt}),
    dailyBrief&&React.createElement(DailyBriefBanner,{brief:dailyBrief,onDismiss:()=>setDailyBrief(null)})
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>console.log('SW:',r.scope))
      .catch(e=>console.log('SW err:',e));
  });
}
let _dp=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();_dp=e;
  setTimeout(()=>{
    if(!_dp)return;
    const b=document.createElement('div');
    b.innerHTML='<div style="position:fixed;bottom:72px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:528px;background:#1e2235;border:1px solid #2a3050;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.6);font-family:DM Sans,sans-serif;"><div style="display:flex;align-items:center;gap:12px;"><img src="icon-192.png" width="36" height="36" style="border-radius:8px;"/><div><div style="color:#e8eaf6;font-size:13px;font-weight:600;">Instalar Sonia</div><div style="color:#7b83a6;font-size:11px;">App de consultorio</div></div></div><div style="display:flex;gap:8px;"><button id="sonia-no" style="background:transparent;border:1px solid #2a3050;color:#7b83a6;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;">No</button><button id="sonia-si" style="background:#6c8fff;border:none;color:#fff;padding:7px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;">Instalar</button></div></div>';
    document.body.appendChild(b);
    document.getElementById('sonia-si').onclick=()=>{_dp.prompt();_dp.userChoice.then(()=>{b.remove();_dp=null;});};
    document.getElementById('sonia-no').onclick=()=>b.remove();
  },4000);
});
</script>
